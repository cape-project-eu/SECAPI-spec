
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100" viewBox="0 0 160 100">
  <defs>
    <linearGradient id="igwGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f8f5"/>
      <stop offset="100%" stop-color="#16a085"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#888"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Gateway portal -->
    <rect x="40" y="30" width="80" height="40" rx="8" ry="8"
          fill="url(#igwGradient)" stroke="#117864" stroke-width="2"/>
    <!-- Ingress and egress arrows -->
    <polygon points="25,50 35,45 35,48 60,48 60,52 35,52 35,55" fill="#117864"/>
    <polygon points="135,50 125,45 125,48 100,48 100,52 125,52 125,55" fill="#117864"/>

    <!-- Label -->
    <text x="80" y="95" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="middle">
      Internet Gateway
    </text>
  </g>
</svg>
