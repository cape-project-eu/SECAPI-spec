
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100" viewBox="0 0 160 100">
  <defs>
    <linearGradient id="vpcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="100%" stop-color="#f4d03f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#999"/>
    </filter>
  </defs>
  <g filter="url(#softShadow)">
    <!-- Outer VPC container -->
    <rect x="10" y="10" width="140" height="70" rx="10" ry="10"
          fill="url(#vpcGradient)" stroke="#a8871c" stroke-width="2"/>

    <!-- Icon symbol -->
    <g transform="translate(30,30)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#fff" stroke="#a8871c" stroke-width="1.5"/>
      <circle cx="40" cy="10" r="10" fill="#fff" stroke="#a8871c" stroke-width="1.5"/>
      <rect x="70" y="0" width="20" height="20" rx="4" fill="#fff" stroke="#a8871c" stroke-width="1.5"/>
      <line x1="20" y1="10" x2="30" y2="10" stroke="#a8871c" stroke-width="1.5"/>
      <line x1="50" y1="10" x2="70" y2="10" stroke="#a8871c" stroke-width="1.5"/>
    </g>

    <!-- Label -->
    <text x="80" y="95" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="middle">
      Network
    </text>
  </g>
</svg>
