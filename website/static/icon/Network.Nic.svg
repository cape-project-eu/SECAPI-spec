
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100" viewBox="0 0 160 100">
  <defs>
    <linearGradient id="nicGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f3f4"/>
      <stop offset="100%" stop-color="#aab7b8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#666"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- NIC card base -->
    <rect x="20" y="35" width="120" height="30" rx="8" ry="8"
          fill="url(#nicGradient)" stroke="#566573" stroke-width="2"/>

    <!-- Ethernet port (left) -->
    <rect x="30" y="40" width="20" height="20" fill="#ffffff" stroke="#34495e" stroke-width="1.5"/>
    <line x1="35" y1="48" x2="45" y2="48" stroke="#34495e" stroke-width="1.5"/>
    <line x1="35" y1="52" x2="45" y2="52" stroke="#34495e" stroke-width="1.5"/>

    <!-- Traces -->
    <line x1="55" y1="50" x2="75" y2="50" stroke="#1c2833" stroke-width="1.5"/>
    <line x1="85" y1="50" x2="105" y2="50" stroke="#1c2833" stroke-width="1.5"/>
    <circle cx="75" cy="50" r="3" fill="#1c2833"/>
    <circle cx="85" cy="50" r="3" fill="#1c2833"/>

    <!-- Label -->
    <text x="80" y="95" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="middle">
      NIC
    </text>
  </g>
</svg>
