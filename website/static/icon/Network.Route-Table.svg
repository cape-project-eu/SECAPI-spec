
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100" viewBox="0 0 160 100">
  <defs>
    <linearGradient id="routeTableGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9e7"/>
      <stop offset="100%" stop-color="#f4d03f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#aaa"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Route table container -->
    <rect x="20" y="20" width="120" height="60" rx="8" ry="8"
          fill="url(#routeTableGradient)" stroke="#b7950b" stroke-width="2"/>

    <!-- Table rows -->
    <line x1="30" y1="40" x2="130" y2="40" stroke="#b7950b" stroke-width="1.5"/>
    <line x1="30" y1="55" x2="130" y2="55" stroke="#b7950b" stroke-width="1.5"/>

    <!-- Arrows representing routes -->
    <polygon points="50,34 60,34 60,30 70,38 60,46 60,42 50,42"
             fill="#b7950b"/>

    <polygon points="90,49 100,49 100,45 110,53 100,61 100,57 90,57"
             fill="#b7950b"/>

    <!-- Label -->
    <text x="80" y="95" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="middle">
      Route Table
    </text>
  </g>
</svg>
