
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100" viewBox="0 0 160 100">
  <defs>
    <linearGradient id="logGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9e7"/>
      <stop offset="100%" stop-color="#f5b041"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#aaa"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Log sheet -->
    <rect x="40" y="20" width="80" height="60" rx="8" ry="8"
          fill="url(#logGradient)" stroke="#d68910" stroke-width="2"/>

    <!-- Checkboxes and lines -->
    <rect x="50" y="30" width="8" height="8" fill="#ffffff" stroke="#af601a" stroke-width="1"/>
    <line x1="62" y1="34" x2="105" y2="34" stroke="#af601a" stroke-width="1.5"/>
    
    <rect x="50" y="45" width="8" height="8" fill="#ffffff" stroke="#af601a" stroke-width="1"/>
    <line x1="62" y1="49" x2="105" y2="49" stroke="#af601a" stroke-width="1.5"/>
    
    <rect x="50" y="60" width="8" height="8" fill="#ffffff" stroke="#af601a" stroke-width="1"/>
    <line x1="62" y1="64" x2="105" y2="64" stroke="#af601a" stroke-width="1.5"/>

    <!-- Label -->
    <text x="80" y="95" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="middle">
      Activity Log
    </text>
  </g>
</svg>
