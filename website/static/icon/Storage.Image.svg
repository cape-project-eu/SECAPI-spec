
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100" viewBox="0 0 160 100">
  <defs>
    <linearGradient id="imageGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5eef8"/>
      <stop offset="100%" stop-color="#af7ac5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#888"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Disk -->
    <circle cx="80" cy="50" r="25" fill="url(#imageGradient)" stroke="#884ea0" stroke-width="2"/>
    <circle cx="80" cy="50" r="6" fill="#ffffff" stroke="#884ea0" stroke-width="1.5"/>

    <!-- Gear-like marks (simplified radial lines) -->
    <line x1="80" y1="25" x2="80" y2="15" stroke="#884ea0" stroke-width="1.5"/>
    <line x1="80" y1="75" x2="80" y2="85" stroke="#884ea0" stroke-width="1.5"/>
    <line x1="55" y1="50" x2="45" y2="50" stroke="#884ea0" stroke-width="1.5"/>
    <line x1="105" y1="50" x2="95" y2="50" stroke="#884ea0" stroke-width="1.5"/>

    <!-- Label -->
    <text x="80" y="95" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="middle">
      Image
    </text>
  </g>
</svg>
