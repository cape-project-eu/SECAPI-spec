
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100" viewBox="0 0 160 100">
  <defs>
    <linearGradient id="publicIpGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eaf2f8"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#999"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Rounded rectangle IP container -->
    <rect x="30" y="30" width="100" height="40" rx="8" ry="8"
          fill="url(#publicIpGradient)" stroke="#1f618d" stroke-width="2"/>

    <!-- Globe symbol inside the box -->
    <circle cx="80" cy="50" r="10" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="70" y1="50" x2="90" y2="50" stroke="#ffffff" stroke-width="1"/>
    <path d="M80,40 A10,10 0 0,1 80,60 A10,10 0 0,1 80,40 Z" fill="none" stroke="#ffffff" stroke-width="1"/>
    <path d="M75,40 A10,10 0 0,0 75,60" fill="none" stroke="#ffffff" stroke-width="1"/>
    <path d="M85,40 A10,10 0 0,1 85,60" fill="none" stroke="#ffffff" stroke-width="1"/>

    <!-- Label -->
    <text x="80" y="100" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="middle">
      Public IP
    </text>
  </g>
</svg>
