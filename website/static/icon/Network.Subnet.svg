
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100" viewBox="0 0 160 100">
  <defs>
    <linearGradient id="subnetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f8f5"/>
      <stop offset="100%" stop-color="#76d7c4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#999"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Subnet container -->
    <rect x="10" y="10" width="140" height="70" rx="10" ry="10"
          fill="url(#subnetGradient)" stroke="#138d75" stroke-width="2"/>

    <!-- Hosts and connections -->
    <g transform="translate(30,30)">
      <!-- Central switch/router -->
      <circle cx="50" cy="10" r="8" fill="#ffffff" stroke="#138d75" stroke-width="1.5"/>
      <line x1="50" y1="18" x2="50" y2="30" stroke="#138d75" stroke-width="1.5"/>

      <!-- Host 1 -->
      <rect x="0" y="30" width="20" height="15" fill="#ffffff" stroke="#138d75" stroke-width="1.5"/>
      <line x1="10" y1="30" x2="50" y2="30" stroke="#138d75" stroke-width="1.5"/>

      <!-- Host 2 -->
      <rect x="40" y="30" width="20" height="15" fill="#ffffff" stroke="#138d75" stroke-width="1.5"/>
      <line x1="50" y1="30" x2="50" y2="30" stroke="#138d75" stroke-width="1.5"/>

      <!-- Host 3 -->
      <rect x="80" y="30" width="20" height="15" fill="#ffffff" stroke="#138d75" stroke-width="1.5"/>
      <line x1="90" y1="30" x2="50" y2="30" stroke="#138d75" stroke-width="1.5"/>
    </g>

    <!-- Label -->
    <text x="80" y="95" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="middle">
      Subnet
    </text>
  </g>
</svg>
