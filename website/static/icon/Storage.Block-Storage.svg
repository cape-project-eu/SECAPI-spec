
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100" viewBox="0 0 160 100">
  <defs>
    <linearGradient id="volumeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eaf2f8"/>
      <stop offset="100%" stop-color="#5dade2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#999"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Cylinder shape -->
    <ellipse cx="80" cy="30" rx="40" ry="10" fill="url(#volumeGradient)" stroke="#2e86c1" stroke-width="2"/>
    <rect x="40" y="30" width="80" height="40" fill="url(#volumeGradient)" stroke="#2e86c1" stroke-width="2"/>
    <ellipse cx="80" cy="70" rx="40" ry="10" fill="none" stroke="#2e86c1" stroke-width="2"/>

    <!-- Label -->
    <text x="80" y="95" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="middle">
      Block Storage
    </text>
  </g>
</svg>
