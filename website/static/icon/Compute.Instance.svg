
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100" viewBox="0 0 160 100">
  <defs>
    <linearGradient id="instanceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ebf5fb"/>
      <stop offset="100%" stop-color="#3498db"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#999"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Main instance box -->
    <rect x="40" y="25" width="80" height="50" rx="6" ry="6"
          fill="url(#instanceGradient)" stroke="#2e86c1" stroke-width="2"/>

    <!-- Instance screen -->
    <rect x="50" y="35" width="60" height="25" fill="#ffffff" stroke="#2e86c1" stroke-width="1.5"/>

    <!-- Power button -->
    <circle cx="80" cy="65" r="4" fill="#2e86c1"/>

    <!-- Label -->
    <text x="80" y="95" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="middle">
      Instance
    </text>
  </g>
</svg>
