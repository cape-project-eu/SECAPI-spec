
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100" viewBox="0 0 160 100">
  <defs>
    <linearGradient id="workspaceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f8f5"/>
      <stop offset="100%" stop-color="#1abc9c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#aaa"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Workspace folder-like container -->
    <rect x="30" y="30" width="100" height="45" rx="8" ry="8"
          fill="url(#workspaceGradient)" stroke="#148f77" stroke-width="2"/>
    <rect x="30" y="20" width="35" height="20" rx="5" ry="5"
          fill="#148f77" stroke="#117a65" stroke-width="1.5"/>

    <!-- Label -->
    <text x="80" y="95" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="middle">
      Workspace
    </text>
  </g>
</svg>
