group: foundation
title: Compute
name: compute
version: v1
description: |
    The Compute Foundation API provides access to compute resources 
    including virtual machines and instance management.
    This API is part of the Sovereign European Cloud API.
resources:
  - name: sku
    plural: skus
    hierarchy: [tenant]
    schema: ./schemas/instance-sku.yaml#/InstanceSku
    operations: [list, get]
    description:
      list: |
        Retrieves a list of available SKU (Stock Keeping Unit) configurations for compute instances.

        ## Available SECA SKUs with their capabilities.
        Seca-Resources don't have mandatory parameters and extensions.
        (Provider may have more SKUs available.)

        | Tier | vCPU | RAM | Architecture | benchmarkPoints |
        |-|-|-|-|-|
        | 2XS.D | 1 | 1 | amd64 | min 500 |
        | XS.D | 1 | 2 | amd64 | min 750 |
        | S.D | 2 | 4 | amd64 | min 2200 |
        | M.D | 4 | 8 | amd64 | min 3500 |
        | L.D | 8 | 16 | amd64 | min 6000 |
        | XL.D | 16 | 32 | amd64 | min 9000 |
        | 2XL.D | 32 | 64 | amd64 | min 13000 |
        | 2XS.S | 1 | 1 | amd64 | min 500 |
        | XS.S | 1 | 2 | amd64 | min 700 |
        | S.S | 2 | 4 | amd64 | min 2000 |
        | M.S | 4 | 8 | amd64 | min 3000 |
        | L.S | 8 | 16 | amd64 | min 5500 |
        | XL.S | 16 | 32 | amd64 | min 8000 |
        | 2XL.S | 32 | 64 | amd64 | min 9000 |
    example:
      list:
        metadata:
          provider: "seca.compute/v1"
          resource: "tenants/1/skus"
          verb: list
        items:
        - { metadata: { name: 'seca.2xs.d' }, labels: { tier: '2XS.D', provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  1, ram:  1 }}
        - { metadata: { name: 'seca.xs.d'  }, labels: { tier: 'XS.D',  provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  1, ram:  2 }}
        - { metadata: { name: 'seca.s.d'   }, labels: { tier: 'S.D',   provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  2, ram:  4 }}
        - { metadata: { name: 'seca.m.d'   }, labels: { tier: 'M.D',   provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  4, ram:  8 }}
        - { metadata: { name: 'seca.l.d'   }, labels: { tier: 'L.D',   provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  8, ram: 16 }}
        - { metadata: { name: 'seca.xl.d'  }, labels: { tier: 'XL.D',  provider: 'seca', architecture: 'amd64' }, spec: { vCPU: 16, ram: 32 }}
        - { metadata: { name: 'seca.2xl.d' }, labels: { tier: '2XL.D', provider: 'seca', architecture: 'amd64' }, spec: { vCPU: 32, ram: 64 }}
        - { metadata: { name: 'seca.2xs.s' }, labels: { tier: '2XS.S', provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  1, ram:  1 }}
        - { metadata: { name: 'seca.xs.s'  }, labels: { tier: 'XS.S',  provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  1, ram:  2 }}
        - { metadata: { name: 'seca.s.s'   }, labels: { tier: 'S.S',   provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  2, ram:  4 }}
        - { metadata: { name: 'seca.m.s'   }, labels: { tier: 'M.S',   provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  4, ram:  8 }}
        - { metadata: { name: 'seca.l.s'   }, labels: { tier: 'L.S',   provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  8, ram: 16 }}
        - { metadata: { name: 'seca.xl.s'  }, labels: { tier: 'XL.S',  provider: 'seca', architecture: 'amd64' }, spec: { vCPU: 16, ram: 32 }}
        - { metadata: { name: 'seca.2xl.s' }, labels: { tier: '2XL.S', provider: 'seca', architecture: 'amd64' }, spec: { vCPU: 32, ram: 64 }}
  - name: instance
    plural: instances
    hierarchy: [tenant, workspace]
    schema: ./schemas/instance.yaml#/Instance
    operations: [list, get, put, delete]
    actions:
    - name: start
      description: Power on (boot) a specific instance
    - name: stop
      description: Power off (shutdown) a specific instance
    - name: restart
      description: Power cycle (reboot) a specific instance
    
