group: foundation
title: Compute
name: compute
version: v1
description: |
    The Compute Foundation API provides access to compute resources 
    including virtual machines and instance management.
    This API is part of the Sovereign European Cloud API.
resources:
  - name: sku
    plural: skus
    hierarchy: [tenant]
    schema: ./schemas/instance-sku.yaml#/components/schemas/InstanceSku
    operations: [list, get]
    description:
      list: |
        Retrieves a list of available SKU (Stock Keeping Unit) configurations for compute instances.

        ## Available SECA SKUs with their capabilities.
        Seca-Resources don"t have mandatory parameters and extensions.
        (Provider may have more SKUs available.)

        | Tier | vCPU | RAM | Architecture | benchmarkPoints |
        |-|-|-|-|-|
        | D2XS | 1 | 1 | amd64 | min 500 |
        | DXS | 1 | 2 | amd64 | min 750 |
        | DS | 2 | 4 | amd64 | min 2200 |
        | DM | 4 | 8 | amd64 | min 3500 |
        | DL | 8 | 16 | amd64 | min 6000 |
        | DXL | 16 | 32 | amd64 | min 9000 |
        | D2XL | 32 | 64 | amd64 | min 13000 |
        | S2XS | 1 | 1 | amd64 | min 500 |
        | SXS | 1 | 2 | amd64 | min 700 |
        | SS | 2 | 4 | amd64 | min 2000 |
        | SM | 4 | 8 | amd64 | min 3000 |
        | SL | 8 | 16 | amd64 | min 5500 |
        | SXL | 16 | 32 | amd64 | min 8000 |
        | S2XL | 32 | 64 | amd64 | min 9000 |
    example:
      list:
        metadata:
          provider: "seca.compute/v1"
          resource: "tenants/1/skus"
          verb: list
        items:
        - { metadata: { name: "seca.d2xs", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.d2xs", ref: "seca.compute/v1/tenants/tn-1/skus/seca.d2xs", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1" }, labels: { tier: "D2XS", provider: "seca", architecture: "amd64" }, spec: { vCPU:  1, ram:  1 }}
        - { metadata: { name: "seca.dxs", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.dxs", ref: "seca.compute/v1/tenants/tn-1/skus/seca.dxs", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1"   }, labels: { tier: "DXS",  provider: "seca", architecture: "amd64" }, spec: { vCPU:  1, ram:  2 }}
        - { metadata: { name: "seca.ds", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.ds", ref: "seca.compute/v1/tenants/tn-1/skus/seca.ds", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1"     }, labels: { tier: "DS",   provider: "seca", architecture: "amd64" }, spec: { vCPU:  2, ram:  4 }}
        - { metadata: { name: "seca.dm", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.dm", ref: "seca.compute/v1/tenants/tn-1/skus/seca.dm", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1"     }, labels: { tier: "DM",   provider: "seca", architecture: "amd64" }, spec: { vCPU:  4, ram:  8 }}
        - { metadata: { name: "seca.dl", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.dl", ref: "seca.compute/v1/tenants/tn-1/skus/seca.dl", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1"     }, labels: { tier: "DL",   provider: "seca", architecture: "amd64" }, spec: { vCPU:  8, ram: 16 }}
        - { metadata: { name: "seca.dxl", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.dxl", ref: "seca.compute/v1/tenants/tn-1/skus/seca.dxl", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1"   }, labels: { tier: "DXL",  provider: "seca", architecture: "amd64" }, spec: { vCPU: 16, ram: 32 }}
        - { metadata: { name: "seca.d2xl", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.d2xl", ref: "seca.compute/v1/tenants/tn-1/skus/seca.d2xl", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1" }, labels: { tier: "D2XL", provider: "seca", architecture: "amd64" }, spec: { vCPU: 32, ram: 64 }}
        - { metadata: { name: "seca.s2xs", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.s2xs", ref: "seca.compute/v1/tenants/tn-1/skus/seca.s2xs", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1" }, labels: { tier: "S2XS", provider: "seca", architecture: "amd64" }, spec: { vCPU:  1, ram:  1 }}
        - { metadata: { name: "seca.sxs", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.sxs", ref: "seca.compute/v1/tenants/tn-1/skus/seca.sxs", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1"   }, labels: { tier: "SXS",  provider: "seca", architecture: "amd64" }, spec: { vCPU:  1, ram:  2 }}
        - { metadata: { name: "seca.ss", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.ss", ref: "seca.compute/v1/tenants/tn-1/skus/seca.ss", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1"     }, labels: { tier: "SS",   provider: "seca", architecture: "amd64" }, spec: { vCPU:  2, ram:  4 }}
        - { metadata: { name: "seca.sm", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.sm", ref: "seca.compute/v1/tenants/tn-1/skus/seca.sm", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1"     }, labels: { tier: "SM",   provider: "seca", architecture: "amd64" }, spec: { vCPU:  4, ram:  8 }}
        - { metadata: { name: "seca.sl", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.sl", ref: "seca.compute/v1/tenants/tn-1/skus/seca.sl", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1"     }, labels: { tier: "SL",   provider: "seca", architecture: "amd64" }, spec: { vCPU:  8, ram: 16 }}
        - { metadata: { name: "seca.sxl", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.sxl", ref: "seca.compute/v1/tenants/tn-1/skus/seca.sxl", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1"   }, labels: { tier: "SXL",  provider: "seca", architecture: "amd64" }, spec: { vCPU: 16, ram: 32 }}
        - { metadata: { name: "seca.s2xl", provider: "seca.compute/v1", resource: "tenants/tn-1/skus/seca.s2xl", ref: "seca.compute/v1/tenants/tn-1/skus/seca.s2xl", verb: "get", apiVersion: "v1", kind: "instance-sku", tenant: "ts-1", region: "eu-central-1" }, labels: { tier: "S2XL", provider: "seca", architecture: "amd64" }, spec: { vCPU: 32, ram: 64 }}
  - name: instance
    plural: instances
    hierarchy: [tenant, workspace]
    schema: ./schemas/instance.yaml#/components/schemas/Instance
    operations: [list, get, put, delete]
    actions:
    - name: start
      description: Power on (boot) a specific instance
    - name: stop
      description: Power off (shutdown) a specific instance
    - name: restart
      description: Power cycle (reboot) a specific instance
    
