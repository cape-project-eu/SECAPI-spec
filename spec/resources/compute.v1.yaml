group: foundation
title: Compute
name: compute
version: v1
description: |
    The Compute Foundation API provides access to compute resources 
    including virtual machines and instance management.
    This API is part of the Sovereign European Cloud API.
resources:
  - name: sku
    plural: skus
    hierarchy: [tenant]
    schema: ./schemas/instance-sku.yaml#/InstanceSku
    operations: [list, get]
    description:
      list: |
        Retrieves a list of available SKU (Stock Keeping Unit) configurations for compute instances.

        ## Available SECA SKUs with their capabilities.
        Seca-Resources don't have mandatory parameters and extensions.
        (Provider may have more SKUs available.)

        | Tier | vCPU | RAM | Architecture | benchmarkPoints |
        |-|-|-|-|-|
        | 2XS | 1 | 1 | amd64 | min 500 |
        | XS | 1 | 2 | amd64 | min 750 |
        | S | 2 | 4 | amd64 | min 2200 |
        | M | 4 | 8 | amd64 | min 3500 |
        | L | 8 | 16 | amd64 | min 6000 |
        | XL | 16 | 32 | amd64 | min 9000 |
        | 2XL | 32 | 64 | amd64 | min 13000 |
    example:
      list:
        metadata:
          provider: "seca.compute/v1"
          resource: "tenants/1/skus"
          verb: list
        items:
        - { metadata: { name: 'seca.2xs' }, labels: { tier: '2XS', provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  1, ram:  1 }}
        - { metadata: { name: 'seca.xs'  }, labels: { tier: 'XS',  provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  1, ram:  2 }}
        - { metadata: { name: 'seca.s'   }, labels: { tier: 'S',   provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  2, ram:  4 }}
        - { metadata: { name: 'seca.m'   }, labels: { tier: 'M',   provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  4, ram:  8 }}
        - { metadata: { name: 'seca.l'   }, labels: { tier: 'L',   provider: 'seca', architecture: 'amd64' }, spec: { vCPU:  8, ram: 16 }}
        - { metadata: { name: 'seca.xl'  }, labels: { tier: 'XL',  provider: 'seca', architecture: 'amd64' }, spec: { vCPU: 16, ram: 32 }}
        - { metadata: { name: 'seca.2xl' }, labels: { tier: '2XL', provider: 'seca', architecture: 'amd64' }, spec: { vCPU: 32, ram: 64 }}
  - name: instance
    plural: instances
    hierarchy: [tenant, workspace]
    schema: ./schemas/instance.yaml#/Instance
    operations: [list, get, put, delete]
    actions:
    - name: start
      description: Power on (boot) a specific instance
    - name: stop
      description: Power off (shutdown) a specific instance
    - name: restart
      description: Power cycle (reboot) a specific instance
    
