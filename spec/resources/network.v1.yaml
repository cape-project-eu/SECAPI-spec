group: foundation
title: Network
name: network
version: v1
description: |
  The Network Foundation API provides access to network resources, including Networks, NICs, security groups, subnets, and routing tables.
  This API is part of the Sovereign European Cloud API.
resources:
  - name: sku
    plural: skus
    hierarchy: [tenant]
    schema: ./schemas/network-sku.yaml#/NetworkSku
    operations: [list, get]
    description:
      list: |
        Retrieves a list of available SKU (Stock Keeping Unit) configurations for network resources.
        Not all bandwidth tiers are available for all instances in all regions.

        ## Available SECA Network SKUs with their capabilities
        Network SKUs represent guaranteed bandwidth performance for 95% of time within a 24h period.

        | Tier | Bandwidth | Packets per second |
        |-|-|-|
        | N1K  | 1 Gbit/s | 10000 packets/s |
        | N5K  | 5 Gbit/s | 40000 packets/s |
        | N10K | 10 Gbit/s | 80000 packets/s |
    example:
      list:
        metadata:
          skipToken: "false"
          provider: "seca.network/v1"
          resource: "tenants/1/skus"
          verb: list
        items:
        - { metadata: { name: "seca.n1k"  }, labels: { provider: "seca", tier: "N1K"  }, spec: { bandwidth: 1000,  packets: 10000 } }
        - { metadata: { name: "seca.n5k"  }, labels: { provider: "seca", tier: "N5K"  }, spec: { bandwidth: 5000,  packets: 40000 } }
        - { metadata: { name: "seca.n10k" }, labels: { provider: "seca", tier: "N10K" }, spec: { bandwidth: 10000, packets: 80000 } }
  - name: security group
    plural: security-groups
    hierarchy: [tenant, workspace]
    schema: './schemas/security-group.yaml#/SecurityGroup'
    operations: [list, get, put, delete]
  - name: nic
    plural: nics
    hierarchy: [tenant, workspace]
    schema: './schemas/nic.yaml#/Nic'
    operations: [list, get, put, delete]
  - name: public ip
    plural: public ips
    hierarchy: [tenant, workspace]
    schema: './schemas/public-ip.yaml#/PublicIp'
    operations: [list, get, put, delete]
  - name: network
    plural: networks
    hierarchy: [tenant, workspace]
    schema: './schemas/network.yaml#/Network'
    operations: [list, get, put, delete]
  - name: internet gateway
    plural: internet gateways
    hierarchy: [tenant, workspace]
    schema: './schemas/internet-gateway.yaml#/InternetGateway'
    operations: [list, get, put, delete]
  - name: subnet
    plural: subnets
    hierarchy: [tenant, workspace, network]
    schema: './schemas/subnet.yaml#/Subnet'
    operations: [list, get, put, delete]
  - name: route-table
    plural: route-tables
    hierarchy: [tenant, workspace, network]
    schema: './schemas/route-table.yaml#/RouteTable'
    operations: [list, get, put, delete]
