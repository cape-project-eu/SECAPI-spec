group: foundation
title: Storage
name: storage
version: v1
description: |
  The Storage Foundation API provides access to storage resources including 
  block storage and images.
  This API is part of the Sovereign European Cloud API.
resources:
  - name: sku
    plural: skus
    hierarchy: [tenant]
    schema: ./schemas/storage-sku.yaml#/StorageSku
    operations: [list, get]
    description:
      list: |
        Retrieves a list of available SKU (Stock Keeping Unit) configurations for block storage resources.

        ## Available SECA Block Storage SKUs with their capabilities

        Block Storage SKUs represent guaranteed IOPS performance for 99% of time within a 24h period.
        Minimum volume size for guaranteed performance is provider specific. Not all SKUs are available in 
        all regions and all CSP. Provides can provide additional SKUs with different performance 
        characteristics.

        | name | iops | description | type |
        |-|-|-|-|
        | seca.rd100 | 100     | Very low-performance remote block storage tier             | remote-durable  |
        | seca.rd500 | 500     | Low-performance remote block storage tier                  | remote-durable  |
        | seca.rd2k  | 2.0     | Medium-performance remote block storage tier               | remote-durable  |
        | seca.rd10k | 10.000  | High-performance remote block storage tier                 | remote-durable  |
        | seca.rd20k | 20.000  | Very high-performance remote block storage tier            | remote-durable  |
        | seca.ld100 | 100     | Very low-performance local-durable block storage tier      | local-durable   |
        | seca.ld500 | 500     | Low-performance local-durable block storage tier           | local-durable   |
        | seca.ld5k  | 5.0     | Medium-performance local-durable block storage tier        | local-durable   |
        | seca.ld20k | 20.000  | High-performance local-durable block storage tier          | local-durable   |
        | seca.ld40k | 40.000  | Very high-performance local-durable block storage tier     | local-durable   |
        | seca.le100 | 100     | Very low-performance local-ephemeral block storage tier    | local-ephemeral |
        | seca.le500 | 500     | Low-performance local-ephemeral block storage tier         | local-ephemeral |
        | seca.le5k  | 5.0     | Medium-performance local-ephemeral block storage tier      | local-ephemeral |
        | seca.le20k | 20.000  | High-performance local-ephemeral block storage tier        | local-ephemeral |
        | seca.le40k | 40.000  | Very high-performance local-ephemeral block storage tier   | local-ephemeral |
    example:
      list:
        metadata:
          skipToken: "false"
          scope: "workspace/production"
          resource: "seca.compute/instances/my-server"
          verb: get  
        items:
        - { spec: { iops: 100, type: "remote-durable", minVolumeSize: 50, description: 'Very low-performance remote-durable block storage tier' }}
        - { spec: { iops: 500, type: "remote-durable", minVolumeSize: 50, description: 'Low-performance remote-durable block storage tier' }}
        - { spec: { iops: 2000, type: "remote-durable", minVolumeSize: 50, description: 'Medium-performance remote-durable block storage tier' }}
        - { spec: { iops: 10000, type: "remote-durable", minVolumeSize: 50, description: 'High-performance remote-durable block storage tier' }}
        - { spec: { iops: 20000, type: "remote-durable", minVolumeSize: 50, description: 'Very high-performance remote-durable block storage tier' }}
        - { spec: { iops: 100, type: "local-durable", minVolumeSize: 50, description: 'Very low-performance local block storage tier' }}
        - { spec: { iops: 500, type: "local-durable", minVolumeSize: 50, description: 'Low-performance local block storage tier' }}
        - { spec: { iops: 5000, type: "local-durable", minVolumeSize: 50, description: 'Medium-performance local block storage tier' }}
        - { spec: { iops: 20000, type: "local-durable", minVolumeSize: 50, description: 'High-performance local block storage tier' }}
        - { spec: { iops: 40000, type: "local-durable", minVolumeSize: 50, description: 'Very high-performance local block storage tier' }}
        - { spec: { iops: 100, type: "local-ephemeral", minVolumeSize: 50, description: 'Very low-performance local block storage tier' }}
        - { spec: { iops: 500, type: "local-ephemeral", minVolumeSize: 50, description: 'Low-performance local block storage tier' }}
        - { spec: { iops: 5000, type: "local-ephemeral", minVolumeSize: 50, description: 'Medium-performance local block storage tier' }}
        - { spec: { iops: 20000, type: "local-ephemeral", minVolumeSize: 50, description: 'High-performance local block storage tier' }}
        - { spec: { iops: 40000, type: "local-ephemeral", minVolumeSize: 50, description: 'Very high-performance local block storage tier' }}
  - name: image
    plural: images
    hierarchy: [tenant]
    schema: ./schemas/image.yaml#/Image
    operations: [list, get, put, delete]
    description:
      put:
        Creates or updates a image. The return code of the endpoint provides indicates if the resource was created or updated.
        A client must accept both as successful response to the request. Please check the [Image Handling](/docs/content/Other/image-handling) section
        before creating images.
  - name: block-storage
    plural: block-storages
    hierarchy: [tenant, workspace]
    schema: ./schemas/block-storage.yaml#/BlockStorage
    operations: [list, get, put, delete]
