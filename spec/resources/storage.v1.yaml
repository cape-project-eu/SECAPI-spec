group: foundation
title: Storage
name: storage
version: v1
description: |
  The Storage Foundation API provides access to storage resources including 
  block storage and images.
  This API is part of the Sovereign European Cloud API.
resources:
  - name: sku
    plural: skus
    hierarchy: [tenant]
    schema: ./schemas/storage-sku.yaml#/components/schemas/StorageSku
    operations: [list, get]
    description:
      list: |
        Retrieves a list of available SKU (Stock Keeping Unit) configurations for block storage resources.

        ## Available SECA Block Storage SKUs with their capabilities

        Block Storage SKUs represent guaranteed IOPS performance for 99% of time within a 24h period.
        Minimum volume size for guaranteed performance is provider specific. Not all SKUs are available in 
        all regions and all CSP. Provides can provide additional SKUs with different performance 
        characteristics.

        | Tier | IOPS | Type |
        |-|-|-|
        | RD100 | 100     | remote-durable  |
        | RD500 | 500     | remote-durable  |
        | RD2K  | 2.0     | remote-durable  |
        | RD10K | 10.000  | remote-durable  |
        | RD20K | 20.000  | remote-durable  |
        | LD100 | 100     | local-durable   |
        | LD500 | 500     | local-durable   |
        | LD5K  | 5.0     | local-durable   |
        | LD20K | 20.000  | local-durable   |
        | LD40K | 40.000  | local-durable   |
        | LE100 | 100     | local-ephemeral |
        | LE500 | 500     | local-ephemeral |
        | LE5K  | 5.0     | local-ephemeral |
        | LE20K | 20.000  | local-ephemeral |
        | LE40K | 40.000  | local-ephemeral |
    example:
      list:
        metadata:
          skipToken: "false"
          provider: "seca.compute/v1"
          resource: "tenants/1/skus"
          verb: list  
        items:
        - { metadata: { name: "seca.rd100", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.rd100", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1" }, labels: { provider: "seca", tier: "RD100" }, spec: { iops:   100, type: "remote-durable",  minVolumeSize: 50 }}
        - { metadata: { name: "seca.rd500", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.rd500", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1" }, labels: { provider: "seca", tier: "RD500" }, spec: { iops:   500, type: "remote-durable",  minVolumeSize: 50 }}
        - { metadata: { name: "seca.rd2k", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.rd2k", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1"  }, labels: { provider: "seca", tier: "RD2K"  }, spec: { iops:  2000, type: "remote-durable",  minVolumeSize: 50 }}
        - { metadata: { name: "seca.rd10k", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.rd10k", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1" }, labels: { provider: "seca", tier: "RD10K" }, spec: { iops: 10000, type: "remote-durable",  minVolumeSize: 50 }}
        - { metadata: { name: "seca.rd20k", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.rd20k", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1" }, labels: { provider: "seca", tier: "RD20K" }, spec: { iops: 20000, type: "remote-durable",  minVolumeSize: 50 }}
        - { metadata: { name: "seca.ld100", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.ld100", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1" }, labels: { provider: "seca", tier: "LD100" }, spec: { iops:   100, type: "local-durable",   minVolumeSize: 50 }}
        - { metadata: { name: "seca.ld500", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.ld500", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1" }, labels: { provider: "seca", tier: "LD500" }, spec: { iops:   500, type: "local-durable",   minVolumeSize: 50 }}
        - { metadata: { name: "seca.ld5k", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.ld5k", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1"  }, labels: { provider: "seca", tier: "LD5K"  }, spec: { iops:  5000, type: "local-durable",   minVolumeSize: 50 }}
        - { metadata: { name: "seca.ld20k", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.ld20k", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1" }, labels: { provider: "seca", tier: "LD20K" }, spec: { iops: 20000, type: "local-durable",   minVolumeSize: 50 }}
        - { metadata: { name: "seca.le100", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.le100", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1" }, labels: { provider: "seca", tier: "LE100" }, spec: { iops:   100, type: "local-ephemeral", minVolumeSize: 50 }}
        - { metadata: { name: "seca.le500", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.le500", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1" }, labels: { provider: "seca", tier: "LE500" }, spec: { iops:   500, type: "local-ephemeral", minVolumeSize: 50 }}
        - { metadata: { name: "seca.le5k", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.le5k", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1"  }, labels: { provider: "seca", tier: "LE5K"  }, spec: { iops:  5000, type: "local-ephemeral", minVolumeSize: 50 }}
        - { metadata: { name: "seca.le20k", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.le20k", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1" }, labels: { provider: "seca", tier: "LE20K" }, spec: { iops: 20000, type: "local-ephemeral", minVolumeSize: 50 }}
        - { metadata: { name: "seca.le40k", provider: "seca.storage/v1", resource: "tenants/tn-1/skus/seca.le40k", verb: "get", apiVersion: "v1", kind: "storage-sku", tenant: "ts-1", region: "us-west-1" }, labels: { provider: "seca", tier: "LE40K" }, spec: { iops: 40000, type: "local-ephemeral", minVolumeSize: 50 }}
  - name: image
    plural: images
    hierarchy: [tenant]
    schema: ./schemas/image.yaml#/components/schemas/Image
    operations: [list, get, put, delete]
    description:
      put:
        Creates or updates a image. The return code of the endpoint provides indicates if the resource was created or updated.
        A client must accept both as successful response to the request. Please check the [Image Handling](/docs/content/Other/image-handling) section
        before creating images.
  - name: block-storage
    plural: block-storages
    hierarchy: [tenant, workspace]
    schema: ./schemas/block-storage.yaml#/components/schemas/BlockStorage
    operations: [list, get, put, delete]
