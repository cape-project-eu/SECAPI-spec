components:
  schemas:
    InternetGateway:
      description: |
        An InternetGateway is a resource that provides internet access to a subnet.
        It is used in conjunction with a RouteTable to enable internet connectivity.
      allOf:
      - $ref: './resource.yaml#/components/schemas/UserResourceMetadata'
      - type: object
        description: |
          The InternetGateway resource enables access to the public internet
          when used in conjunction with a RouteTable.
        required:
        - spec
        properties:
          metadata:
            $ref: './resource.yaml#/components/schemas/RegionalWorkspaceResourceMetadata'
          spec:
            $ref: './internet-gateway.yaml#/components/schemas/InternetGatewaySpec'
          status:
            $ref: './internet-gateway.yaml#/components/schemas/InternetGatewayStatus'

    InternetGatewaySpec:
      type: object
      description: |
        The internet gateway will use the reserved IP addres.
        the subnet CIDR block to provide internet access to the subnet.
      properties:
        egressOnly:
          type: boolean
          x-go-type-skip-optional-pointer: true
          description: |
            If set to true, the internet gateway will only allow outgoing traffic
            and will not allow incoming traffic. This is useful for public subnets
            that should not be accessible from the internet.
          default: false
      example: {}

    InternetGatewayStatus:
      $ref: "./resource.yaml#/components/schemas/Status"
