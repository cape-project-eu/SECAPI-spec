components:
  schemas:
    Subnet:
      description: |
        A Subnet is a logical subdivision of a Network's IP address space.
        It defines a range of IP addresses for compute instances and enables
        network segmentation and isolation.

        The Subnet resource is used to manage the configuration and status
        of a subnet within a network. It includes properties such as the
        CIDR block, zone, and route table reference.
      allOf:
      - $ref: './resource.yaml#/components/schemas/UserResourceMetadata'
      - type: object
        description: |
          A Subnet represents a logical subdivision of a Network's IP address space.

          Key Network Routing Concepts:
          - Defines a range of IP addresses for compute instances
          - Enables network segmentation and isolation
          - Each subnet requires an explicit route table reference
        required:
        - spec
        properties:
          metadata:
            $ref: './resource.yaml#/components/schemas/RegionalNetworkResourceMetadata'
          spec:
            $ref: './subnet.yaml#/components/schemas/SubnetSpec'
          status:
            $ref: './subnet.yaml#/components/schemas/SubnetStatus'

    SubnetSpec:
      type: object
      description: |
        Detailed specification of the subnet. Automatic address
        assignment is supported, similar to the network configuration. The
        subnet's prefix length must be smaller than the network's prefix
        length, ensuring proper subdivision of the address space.
        The first and last IP addresses in the subnet are reserved
        the network address and broadcast address, respectively.

        Most CSP will not allow to use a different IPv6 prefix length than /64.
      required:
      - cidr
      - zone
      - routeTableRef
      properties:
        cidr:
          $ref: './network.yaml#/components/schemas/cidr'
        zone:
          allOf:
          - $ref: './region.yaml#/components/schemas/Zone'
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-min-length: "1"
            x-kubebuilder-validation-max-length: "32"
        routeTableRef:
          allOf:
          - $ref: './resource.yaml#/components/schemas/Reference'
          description: |
            Reference to the route table used for all NICs in this Subnet.
          example:
            resource: "route-tables/route-table-1"
        skuRef:
          allOf:
          - $ref: './resource.yaml#/components/schemas/Reference'
          description: |
            Reference to the SKU used by default for all NICs in this Network.
            Can be overridden by the NIC
          example:
            resource: "tenants/seca/skus/1000"
      example:
        cidr:
          ipv4: "0.0.0.0/24"
          ipv6: "::/64"
        zone: "a"
        routeTableRef:
          resource: "route-tables/route-table-1"
        skuRef:
          resource: "tenants/seca/skus/1000"

    SubnetStatus:
      description: |
        The status of the subnet, including the current state and any
        associated IP addresses. The status is read-only and provides
        information about the subnet's configuration and health.
      allOf:
      - $ref: "./resource.yaml#/components/schemas/Status"
      - type: object
        readOnly: true
        description: |
          The status of the subnet, including the current state and any
          associated IP addresses.
        properties:
          cidr:
            $ref: './network.yaml#/components/schemas/cidr'
          routeTableRef:
            allOf:
            - $ref: './resource.yaml#/components/schemas/Reference'
            description: |
              The route table used by this subnet.
            example:
              resource: "route-tables/route-table-1"
        example:
          cidr:
            ipv4: "10.100.1.0/24"
            ipv6: "2001:239:203:2400::/64"
          routeTableRef:
            resource: "route-tables/route-table-1"
