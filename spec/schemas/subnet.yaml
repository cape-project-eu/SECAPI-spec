
Subnet:
  allOf:
  - $ref: './resource.yaml#/UserResourceMetadata'
  - type: object
    description: |
      A Subnet represents a logical subdivision of a Network's IP address space.

      Key Network Routing Concepts:
      - Defines a range of IP addresses for compute instances
      - Enables network segmentation and isolation
    required:
    - spec
    properties:
      metadata:
        $ref: './resource.yaml#/ZonalResourceMetadata'
      spec:
        $ref: './subnet.yaml#/SubnetSpec'
      status:
        $ref: './subnet.yaml#/SubnetStatus'

SubnetSpec:
  type: object
  description: |
    Detailed specification of the subnet. Automatic address
    assignment is supported, similar to the network configuration. The
    subnet's prefix length must be smaller than the network's prefix
    length, ensuring proper subdivision of the address space.
    The first and last IP addresses in the subnet are reserved
    the network address and broadcast address, respectively.

    Most CSP will not allow to use a different IPv6 prefix length than /64.
  required:
  - cidr
  - zone
  properties:
    cidr:
      $ref: './network.yaml#/cidr'
    zone:
      $ref: './region.yaml#/Zone'
    routeTableRef:
      allOf:
      - $ref: './resource.yaml#/Reference'
      - type: string
        description: |
          Reference to the route table used by default for all NIC in this Subnet.
          Can be overridden by the NIC
    skuRef:
      allOf:
      - $ref: './resource.yaml#/Reference'
      - type: string
        description: |
          Reference to the SKU used by default for all NIC in this Network.
          Can be overridden by the NIC  
  example:
    cidr:
      ipv4: "0.0.0.0/24"
      ipv6: "::/64"
    zone: "a"
    skuRef: ".../seca.1000" 

SubnetStatus:
  allOf:
  - $ref: "./resource.yaml#/Status"
  - type: object
    readOnly: true
    description: |
      The status of the subnet, including the current state and any
      associated IP addresses.
    properties:
      cidr:
        $ref: './network.yaml#/cidr'
    example:
      cidr:
        ipv4: "10.100.1.0/24"
        ipv6: "2001:239:203:2400::/64"
