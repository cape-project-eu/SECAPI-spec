Instance:
  allOf:
  - $ref: './resource.yaml#/UserResourceMetadata'
  - type: object
    required:
    - spec
    properties:
      metadata:
        $ref: './resource.yaml#/ZonalResourceMetadata'
      spec:
        $ref: './instance.yaml#/InstanceSpec'
      status:
        $ref: './instance.yaml#/InstanceStatus'

InstanceSpec:
  type: object
  required:
  - skuRef
  - zone
  - bootVolume
  properties:
    skuRef:
      $ref: './resource.yaml#/Reference'
    skuExtensions:
      type: object
      additionalProperties:
        type: string
      example: {}
    primaryNicRef:
      $ref: './resource.yaml#/Reference'
    additionalNicRefs:
      type: array
      description: Additional NICs attached to this instance
      items:
        $ref: './resource.yaml#/Reference'
    zone:
      $ref: './region.yaml#/Zone'
    securityGroupRef:
      $ref: './resource.yaml#/Reference'
    userData:
      type: string
      description: |
        Cloud-init user data for instance initialization
        Example cloud-init user configuration with SSH key:
      example: |
        #cloud-config
        packages:
        - nginx
    antiAffinityGroup:
      description: |
        Anti-affinity group to which this instance belongs.
        Instances in the same anti-affinity group are placed on different physical hosts.
        The number of maximum instances in an anti-affinity group is provider-specific.
      type: string
      example: null
    sshKeys:
      type: array
      items:
        type: string
        example: 'ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC0g...'
      description: |
        Provider-specific references to SSH keys used in cloud-init vendorData.
        These references are used to inject SSH public keys during instance initialization
        through cloud-init's vendor data configuration.
    bootVolume:
      $ref: './block-storage.yaml#/VolumeReference'
    dataVolumes:
      type: array
      items:
        $ref: './block-storage.yaml#/VolumeReference'

InstanceStatus:
  allOf:
  - $ref: "./resource.yaml#/Status"
