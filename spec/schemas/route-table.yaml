RouteTable:
  allOf:
  - $ref: './resource.yaml#/UserResourceMetadata'
  - type: object
    required:
    - spec
    properties:
      metadata:
        $ref: './resource.yaml#/RegionalResourceMetadata'
      spec:
        $ref: '#/RouteTableSpec'
      status:
        $ref: '#/RouteTableStatus'

RouteTableSpec:
  type: object
  description: |
    The RouteTableSpec defines the routes that are associated with the route table.
    The `localRef` is a reference to the network it will inherit the routes from.
  required:
  - localRef
  - routes
  properties:
    localRef:
      $ref: './resource.yaml#/Reference'
    routes:
      type: array
      items:
        $ref: '#/RouteSpec'
  example:
    routes:
    - destinationCidrBlock: '0.0.0.0/0'
      targetRef: '.../internet-gateway-1'
    - destinationCidrBlock: '::/0'
      targetRef: '.../internet-gateway-1'

RouteSpec:
  type: object
  description: |
    The target reference can be an instance,
    a gateway or an IP address (v4 or v6) that is part of the
    network the route table is attached to.
  properties:
    destinationCidrBlock:
      type: string
      description: |
        The CIDR block for the destination. The block can be 
        a specific IP address or a range of addresses. It can be
        IPv6 or IPv4.
    targetRef:
      $ref: './resource.yaml#/Reference'

RouteTableStatus:
  allOf:
    - $ref: "./resource.yaml#/Status"
    - type: object
      readOnly: true
      properties:
        routes:
          type: array
          items:
            $ref: '#/RouteStatus'

RouteStatus:
  allOf:
  - $ref: "./resource.yaml#/Status"
  - type: object
    readOnly: true
    description: |
      The status of the route. If the `targetRef` is invalid,
      the status will be `error`. If the route is valid the status
      will be `active`. If the route is referencing a target that
      is not yet created, the status will be `pending`.
    