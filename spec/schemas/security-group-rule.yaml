components:
  schemas:
    SecurityGroupRule:
      description: |
        The SecurityGroupRule resource defines a reusable network access rule.
        It can be referenced by multiple Security Groups to enforce consistent policies.
      allOf:
      - $ref: './resource.yaml#/components/schemas/UserResourceMetadata'
      - type: object
        description: |
          A Security Group Rule defines network access permissions.
        required:
        - spec
        properties:
          metadata:
            $ref: './resource.yaml#/components/schemas/RegionalWorkspaceResourceMetadata'
          spec:
            $ref: '#/components/schemas/SecurityGroupRuleSpec'
          status:
            $ref: '#/components/schemas/SecurityGroupRuleStatus'

    SecurityGroupRuleSpec:
      type: object
      description: |
        Specification of a security group rule defining network access permissions.
        If no version is specified, any IP version will be allowed.
        If no protocol is specified, any network protocol will be allowed.
      required:
      - direction
      properties:
        annotations:
          $ref: './resource.yaml#/components/schemas/Annotations'
        direction:
          type: string
          enum: ['ingress', 'egress']
          x-enumNames:
          - SecurityGroupRuleDirectionIngress
          - SecurityGroupRuleDirectionEgress
          description: |
            Direction of the traffic flow:
            * ingress: Only incoming traffic is allowed
            * egress: Only outgoing traffic is allowed
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-enum: "ingress;egress"
            x-kubebuilder-validation-max-length: "7"
        version:
          x-go-type-skip-optional-pointer: true
          allOf:
          - $ref: './network.yaml#/components/schemas/IPVersion'
        protocol:
          type: string
          x-go-type-skip-optional-pointer: true
          description: Network protocol for the rule
          enum: ['tcp', 'udp', 'tcp+udp', 'icmp']
          x-enumNames:
          - SecurityGroupRuleProtocolTCP
          - SecurityGroupRuleProtocolUDP
          - SecurityGroupRuleProtocolTCPUDP
          - SecurityGroupRuleProtocolICMP
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-enum: "tcp;udp;tcp+udp;icmp"
            x-kubebuilder-validation-max-length: "7"
        ports:
          $ref: '#/components/schemas/Ports'
        icmp:
          $ref: '#/components/schemas/IcmpConfig'
        sourceRef:
          type: array
          x-go-type-skip-optional-pointer: true
          maxItems: 32
          description: |
            Reference to a CIDR block, IP address, gateway, instance or security group that is allowed to communicate
            with the security group. If a security group is specified, all instances in that group are allowed.
            If no sourceRef is specified, all traffic is allowed.
          items:
            $ref: './resource.yaml#/components/schemas/Reference'
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-items: "32"
          example:
          - provider: seca.network/v1
            resource: security-groups/security-group-1
      example:
        annotations:
          description: "Allow incoming HTTP(s) traffic"
        direction: ingress
        version: "IPv4"
        protocol: tcp
        ports:
          list:
          - 80
          - 443
        sourceRef:
        - provider: seca.network/v1
          resource: security-groups/frontend-sg
          ref: seca.network/v1/tenants/tn-1/workspaces/ws-1/security-groups/frontend-sg
    Ports:
      type: object
      description: |
        Defines a specific port list or port range for the rule.
        The configuration allows specifying individual ports, ranges, or a combination of both.

        Behavior:
        - If only `from` is specified, the range is interpreted as a single port: `from` to `from`.
        - If only `to` is specified, the range is interpreted as a single port: `to` to `to`.
        - If both `from` and `to` are specified, the range spans from `from` to `to`.
        - The `list` property can be used to explicitly define additional individual ports.

        The final result is a comprehensive list of ports and/or port ranges.
      properties:
        from:
          x-go-type-skip-optional-pointer: true
          allOf:
          - $ref: '#/components/schemas/Port'
        to:
          x-go-type-skip-optional-pointer: true
          allOf:
          - $ref: '#/components/schemas/Port'
        list:
          type: array
          x-go-type-skip-optional-pointer: true
          maxItems: 100
          items:
            $ref: '#/components/schemas/Port'
          example: [80, 443]
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-items-minimum: "1"
            x-kubebuilder-validation-items-maximum: "65535"
            x-kubebuilder-validation-max-items: "100"

    Port:
      description: |
        A valid network port number.
        The port number is a 16-bit unsigned integer ranging from 1 to 65535.
      type: integer
      minimum: 1
      maximum: 65535
      example: 80
      x-oapi-codegen-extra-tags:
        x-kubebuilder-validation-minimum: "1"
        x-kubebuilder-validation-maximum: "65535"

    IcmpConfig:
      type: object
      description: ICMP specific rule configuration
      required:
      - type
      - code
      properties:
        type:
          type: integer
          description: ICMP type
          minimum: 0
          maximum: 8
          example: 8
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-minimum: "0"
            x-kubebuilder-validation-maximum: "8"
        code:
          type: integer
          description: ICMP code
          minimum: 0
          maximum: 5
          example: 4
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-minimum: "0"
            x-kubebuilder-validation-maximum: "5"

    SecurityGroupRuleStatus:
      $ref: "./resource.yaml#/components/schemas/Status"
