Workspace:
  type: object
  description: |
    Represents a workspace, a workspace is a collection of resources.
  required:
  - spec
  properties:
    metadata:
      $ref: './resource.yaml#/GlobalResourceMetadata'
    spec:
      $ref: './workspace.yaml#/WorkspaceSpec'
    status:
      $ref: './workspace.yaml#/WorkspaceStatus'

WorkspaceSpec:
  type: object
  description: |
    Specification of the workspace, including its capabilities and extensions.
  example: {}

WorkspaceStatus:
  allOf:
  - $ref: "./resource.yaml#/Status"
  - type: object
    readOnly: true
    properties:
      resourceCount:
        type: integer
        description: Number of resources currently in the workspace
        minimum: 0
