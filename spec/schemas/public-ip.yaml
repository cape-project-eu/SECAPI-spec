PublicIp:
  allOf:
  - $ref: './resource.yaml#/UserResourceMetadata'
  - type: object
    description: |
      Represents a public IP address that can be assigned to network 
      resources. A CSP might enable Bring Your Own IP (BYOIP) where
      the IP address are made available.
    required:
    - spec
    properties:
      metadata:
        $ref: './resource.yaml#/RegionalResourceMetadata'
      spec:
        $ref: '#/PublicIpSpec'
      status:
        $ref: '#/PublicIpStatus'

PublicIpSpec:
  type: object
  description: |
    Specification of the public IP.
  required:
    - version
  properties:
    version:
      type: string
      description: IP version of the address
      enum:
        - IPv4
        - IPv6
    address:
      type: string
      description: The public IP address in case of BYOIP.
  example:
    version: "IPv4"

PublicIpStatus:
  allOf:
  - $ref: "./resource.yaml#/Status"
  - type: object
    readOnly: true
    description: |
      Current status of the public IP.
      Condition type `allocation` indicates the status of the public IP allocation.
      The status can be `allocated` or `released`.
      Condition type  `binding` indicates the status of the IP binding to a resource.
      The status can be `bound` or `unbound`.
    properties:
      attachedTo:
        $ref: './resource.yaml#/Reference'
      ipAddress:
        type: string
        description: The public IP address in case.

