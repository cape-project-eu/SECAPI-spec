ClusterSku:
  description: |
    Represents a Stock Keeping Unit (SKU) for kubernetes Clusters.
  allOf:
  - $ref: './resource.yaml#/SystemResourceMetadata'
  - type: object
    properties:
      metadata:
        $ref: './resource.yaml#/SkuResourceMetadata'
      spec:
        $ref: "#/ClusterSkuSpec"

ClusterSkuSpec:
  type: object
  description: |
    Specification of the instance SKU, including its capabilities and extensions.
  required:
  - version
  - automaticUpdatePolicy
  - type
  - releasedAt
  - endOfLifeAt
  properties:
    version:
      type: string
      description: |
        The kubernetes major, minor and patch version.
        The version is a string in the format of `<major>.<minor>.<patch>` or `<major>.<minor>`.
      maxLength: 16
      example: '1.30'
    automaticUpdatePolicy:
      type: string
      description: |
        The automatic updates policy for the kubernetes cluster.

        The policy can be one of the following:
        - `none`: Automatic updates are disabled for the
          kubernetes cluster.
        - `stable`: Automatic updates are enabled for the 
          stable version of kubernetes.
        - `preview`: Automatic updates are enabled for the
          preview version of kubernetes.
      enum:
        - none
        - stable
        - preview
    type:
      type: string
      description: |
        The type of kubernetes cluster.
        - `dedicated`: A dedicated kubernetes control plane cluster.
          This cluster uses extra resources for the control plane.
          It is recommended for performance intensive workloads.
        - `shared`: A shared kubernetes cluster. 
          This cluster uses shared resources for the control plane.
          It is recommended for cost sensitive workloads.
      enum:
        - dedicated
        - shared
    releasedAt:
      type: string
      format: date-time
      description: |
        The date and time when the version was released.
    endOfLifeAt:
      type: string
      format: date-time
      description: |
        The date and time when the version will be end of life.
        After this date, the version will not be supported. Depending
        on the CSP this either means no update, more expensive pricing
        for extended support or a forced upgrade to a newer version.
  example:
    version: '1.30'
    automaticUpdatePolicy: 'stable'
    type: 'shared'
    releasedAt: '2023-10-01T00:00:00Z'
    endOfLifeAt: '2024-10-01T00:00:00Z'
