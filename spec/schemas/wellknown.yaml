components:
  schemas:
    Wellknown:
      type: object
      description: List of global endpoints related to the seca api.
      required:
      - version
      - endpoints
      properties:
        version:
          type: string
          minLength: 1
          example: v1
          description: Version of the the Wellknown data.
          x-extensible-enum:
          - v1
        endpoints:
          type: array
          minItems: 1
          maxItems: 64
          description: All global seca proviers and their endpoints.
          items:
            $ref: '#/components/schemas/WellknownEndpoint'
          example:
          - provider: seca.region/v1
            url: "https://seca.example.com/region/v1"
          - provider: seca.authorization/v1
            url: "https://seca.example.com/authorization/v1"
          - provider: seca.object-storage/v1beta1
            url: "https://seca.example.com/object-storage/v1beta1"

    WellknownEndpoint:
      type: object
      description: Represents a global available seca providers and their endpoints.
      required:
      - provider
      - url
      properties:
        provider:
          type: string
          minLength: 1
          example: "seca.region/v1"
          description: The provider that is available under the given URL.
        url:
          type: string
          minLength: 1
          example: "https://seca.example.com/region/v1"
          description: The endpoint URL.

