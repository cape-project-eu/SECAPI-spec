Region:
  type: object
  required:
    - spec
  properties:
    metadata:
      $ref: './resource.yaml#/ResourceMetadata'
    spec:
      $ref: './region.yaml#/RegionSpec'
    status:
      $ref: './region.yaml#/RegionStatus'
    securitySchemes:
      bearerAuth:
        type: http
        scheme: bearer
        bearerFormat: JWT
        description: |
          Use a JWT token for authentication. The token identifies the user,
          and policies (RBAC, ABAC, or hybrid) determine authorization.  
  description: |
    A geographical area containing a set of data centers, often isolated from other regions for purposes of fault tolerance, redundancy, and availability.

RegionSpec:
  type: object
  required:
    - availableZones
    - providers
  properties:
    availableZones:
      description: |
        The list of zones available in the region.
      type: array
      items:
        type: string
      example: ["eu-west-1a", "eu-west-1b"]  
    providers:
      description: | 
        The list of providers available in the region.
      type: array
      items:
        $ref: './region.yaml#/Provider'
  description: |
    The specification of a region, including the available zones and providers.

RegionStatus:
  $ref: "./resource.yaml#/Status"

Provider:
  type: object
  required:
    - name
    - version
    - url
  properties:
    name:
      type: string
      example: "seca.network"
    version:
      type: string
      example: "v1"
    url:
      type: string
      example: "https://demo.secapi.cloud/providers/seca.network"
  description: |
    A provider of cloud services