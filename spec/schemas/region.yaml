Region:
  type: object
  description: |
    Represents a region, which is a geographical location
    with one or more zones. 
  required:
    - spec
  properties:
    metadata:
      $ref: './resource.yaml#/GlobalResourceMetadata'
    spec:
      $ref: './region.yaml#/RegionSpec'

RegionSpec:
  type: object
  description: |
    The specification of a region, including the available zones and providers.
  required:
    - availableZones
    - providers
  properties:
    availableZones:
      description: |
        The list of zones available in the region.
      type: array
      items:
        $ref: '#/Zone'
      example: ["a", "b", "c"]

    providers:
      description: | 
        The list of providers available in the region.
      type: array
      items:
        $ref: './region.yaml#/Provider'

Zone:
  type: string
  description: Reference to a specific zone within a region
  example: "a"

Provider:
  type: object
  description: |
    A provider of cloud services
  required:
    - name
    - version
    - url
  properties:
    name:
      type: string
      example: "seca.network"
    version:
      type: string
      example: "v1"
    url:
      type: string
      example: "https://demo.secapi.cloud/providers/seca.network"
