SecurityGroup:
  description: |
    The SecurityGroup resource defines a set of rules for controlling network access to and from compute instances.
    It allows you to specify which traffic is allowed or denied based on various criteria.

    The SecurityGroup resource is hierarchical, meaning it can be defined at different levels (tenant, workspace).
    This allows for flexible management of network access rules across different scopes.
  allOf:
  - $ref: './resource.yaml#/UserResourceMetadata'
  - type: object
    description: |
      A Security Group defines network access rules for a group of compute instances.

      Key Concepts:
      - Rules define bi-directional or uni-directional network communication
      - Supports routing between security groups
      - Enables granular control over public internet access
      - Implements stateful connection tracking

      Connection Tracking:
      When a connection is initiated from an allowed source, return traffic^ is automatically permitted,
      even if not explicitly defined in the rules. This ensures seamless, bi-directional communication
      for established connections.

      Routing and Communication Patterns:
      - Group-to-Group Rules: Define explicit communication paths between security groups
      - PublicInternet Target: Allows precise control over internet-facing traffic
      - Ingress/Egress Control: Fine-grained rules for incoming and outgoing traffic
    required:
    - spec
    properties:
      metadata:
        $ref: './resource.yaml#/RegionalResourceMetadata'
      spec:
        $ref: '#/SecurityGroupSpec'
      status:
        $ref: '#/SecurityGroupStatus'

SecurityGroupSpec:
  type: object
  description: Specification of the security group
  properties:
    rules:
      type: array
      description: |
        Network access rules defining communication between security groups and external networks.

        Rule Evaluation:
        - Default behavior is to deny all traffic not explicitly allowed
        - Rules provide granular control over allowed traffic types, sources, and destinations
      items:
        $ref: '#/SecurityGroupRuleSpec'

SecurityGroupStatus:
  description: |
    Status of the security group, including the status of its rules.
    The status is read-only and reflects the current state of the security group.
  allOf:
  - $ref: "./resource.yaml#/Status"
  - type: object
    readOnly: true
    description: |
      Current status of the security group
      Condition type `rules` indicates the status of the security group rules.
      The status can be `applied` or `pending`.
    properties:
      rules:
        type: array
        items:
          $ref: '#/SecurityGroupRuleStatus'

SecurityGroupRuleSpec:
  type: object
  description: |
    Specification of a security group rule defining network access permissions.
  required:
    - direction
    - protocol
  properties:
    annotations:
      $ref: './resource.yaml#/UserResourceMetadata/properties/annotations'
    direction:
      type: string
      enum: ['ingress', 'egress']
      description: |
        Direction of the traffic flow:

        * ingress: Only incoming traffic is allowed
        * egress: Only outgoing traffic is allowed
    version:
      type: string
      enum:
        - IPv4
        - IPv6
        - any
      default: any
    protocol:
      type: string
      description: Network protocol for the rule
      enum: ['tcp', 'udp', 'tcp+udp', 'icmp', 'any']
    ports:
      $ref: '#/Ports'
    icmp:
      $ref: '#/IcmpConfig'
    sourceRefs:
      type: array
      description: |
        List of CIDR blocks, IP addresses, gateways, instances or security group references that are allowed to communicate
        with the security group. If a security group is specified, all instances in that group are allowed.
        If no sourceRefs are specified, all traffic is allowed.
      items:
        $ref: './resource.yaml#/Reference'
  example:
    annotations:
      description: "Allow incoming HTTP(s) traffic"
    direction: ingress
    protocol: tcp
    ports:
      list:
      - 80
      - 443

Ports:
  type: object
  description: |
    Defines a specific port list or port range for the rule.
    The configuration allows specifying individual ports, ranges, or a combination of both.

    Behavior:
    - If only `from` is specified, the range is interpreted as a single port: `from` to `from`.
    - If only `to` is specified, the range is interpreted as a single port: `to` to `to`.
    - If both `from` and `to` are specified, the range spans from `from` to `to`.
    - The `list` property can be used to explicitly define additional individual ports.

    The final result is a comprehensive list of ports and/or port ranges.
  properties:
    from:
      $ref: '#/Port'
    to:
      $ref: '#/Port'
    list:
      type: array
      items:
        $ref: '#/Port'
  example:
    list:
      - 80
      - 443

Port:
  description: |
    A valid network port number.
    The port number is a 16-bit unsigned integer ranging from 1 to 65535.
  type: integer
  minimum: 1
  maximum: 65535
  example: 80 

IcmpConfig:
  type: object
  description: ICMP specific rule configuration
  required:
  - type
  - code
  properties:
    type:
      type: integer
      description: ICMP type
      example: 8
    code:
      type: integer
      description: ICMP code
      example: 4

SecurityGroupRuleStatus:
  $ref: "./resource.yaml#/Status"
