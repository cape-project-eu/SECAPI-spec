components:
  schemas:
    ResourceMetadata:
      description: |
        Metadata for all resources with type and name information.
      allOf:
      - $ref: '#/components/schemas/NameMetadata'
      - $ref: '#/components/schemas/TypeMetadata'
      example:
        name: "resource-name"
        apiVersion: "v1"
        kind: "workspace"
        ref: "seca.workspace/v1/tenants/tn-1/workspaces/resource-name"

    GlobalResourceMetadata:
      description: |
        Metadata for global resources with name, permission, modification and type information.
      allOf:
      - $ref: '#/components/schemas/NameMetadata'
      - $ref: '#/components/schemas/PermissionMetadata'
      - $ref: '#/components/schemas/ModificationMetadata'
      - $ref: '#/components/schemas/TypeMetadata'

    GlobalTenantResourceMetadata:
      description: |
        Metadata for global resources with name, permission, modification, type, and tenant information.
      allOf:
      - $ref: '#/components/schemas/NameMetadata'
      - $ref: '#/components/schemas/PermissionMetadata'
      - $ref: '#/components/schemas/ModificationMetadata'
      - $ref: '#/components/schemas/TypeMetadata'
      - $ref: '#/components/schemas/TenantMetadata'

    RegionalResourceMetadata:
      description: |
        Metadata for regional resources with name, permission, modification, type, tenant and region information.
      allOf:
      - $ref: '#/components/schemas/NameMetadata'
      - $ref: '#/components/schemas/PermissionMetadata'
      - $ref: '#/components/schemas/ModificationMetadata'
      - $ref: '#/components/schemas/TypeMetadata'
      - $ref: '#/components/schemas/TenantMetadata'
      - $ref: '#/components/schemas/RegionalMetadata'

    RegionalWorkspaceResourceMetadata:
      description: |
        Metadata for regional resources with name, permission, modification, type, tenant and workspace and region information.
      allOf:
      - $ref: '#/components/schemas/NameMetadata'
      - $ref: '#/components/schemas/PermissionMetadata'
      - $ref: '#/components/schemas/ModificationMetadata'
      - $ref: '#/components/schemas/TypeMetadata'
      - $ref: '#/components/schemas/TenantMetadata'
      - $ref: '#/components/schemas/WorkspaceMetadata'
      - $ref: '#/components/schemas/RegionalMetadata'

    RegionalNetworkResourceMetadata:
      description: |
        Metadata for regional resources with name, permission, modification, type, tenant, workspace, network and region information.
      allOf:
      - $ref: '#/components/schemas/NameMetadata'
      - $ref: '#/components/schemas/PermissionMetadata'
      - $ref: '#/components/schemas/ModificationMetadata'
      - $ref: '#/components/schemas/TypeMetadata'
      - $ref: '#/components/schemas/TenantMetadata'
      - $ref: '#/components/schemas/WorkspaceMetadata'
      - $ref: '#/components/schemas/NetworkMetadata'
      - $ref: '#/components/schemas/RegionalMetadata'

    SkuResourceMetadata:
      description: |
        Metadata for SKU resources with name, permission, type, tenant and region information.
      allOf:
      - $ref: '#/components/schemas/NameMetadata'
      - $ref: '#/components/schemas/PermissionMetadata'
      - $ref: '#/components/schemas/TypeMetadata'
      - $ref: '#/components/schemas/TenantMetadata'
      - $ref: '#/components/schemas/RegionalMetadata'

    TypeMetadata:
      type: object
      readOnly: true
      required:
      - apiVersion
      - kind
      - ref
      description: |
        Metadata for all resources with type information.
      properties:
        apiVersion:
          type: string
          description: API version of the resource
          maxLength: 16
          default: v1
        kind:
          type: string
          description: Type of the resource
          enum:
          - activity-log
          - block-storage
          - image
          - instance
          - instance-sku
          - internet-gateway
          - network
          - network-load-balancer
          - network-sku
          - nic
          - object-storage-account
          - public-ip
          - region
          - role
          - role-assignment
          - routing-table
          - security-group
          - security-group-rule
          - storage-sku
          - subnet
          - workspace
          x-enumNames:
          - ResourceKindActivityLog
          - ResourceKindBlockStorage
          - ResourceKindImage
          - ResourceKindInstance
          - ResourceKindInstanceSku
          - ResourceKindInternetGateway
          - ResourceKindNetwork
          - ResourceKindNetworkLoadBalancer
          - ResourceKindNetworkSku
          - ResourceKindNic
          - ResourceKindObjectStorageAccount
          - ResourceKindPublicIP
          - ResourceKindRegion
          - ResourceKindRole
          - ResourceKindRoleAssignment
          - ResourceKindRoutingTable
          - ResourceKindSecurityGroup
          - ResourceKindSecurityGroupRule
          - ResourceKindStorageSku
          - ResourceKindSubnet
          - ResourceKindWorkspace
        ref:
          $ref: '#/components/schemas/ReferenceURN'

    Reference:
      $ref: '#/components/schemas/ReferenceObject'

    ReferenceURN:
      type: string
      description: |
        A unique resource name (URN) used to identify and reference this resource.

        The URN is NOT a URL — it does not contain a protocol scheme (http/https), a host,
        or any endpoint-specific prefix. It is a portable, transport-agnostic identifier.
        A configured SDK client — which knows the provider's base URL and endpoint mapping —
        can derive a URL from a URN, but the URN alone cannot be turned into a URL without
        that SDK configuration context. This separation keeps the URN portable across
        environments and CSP deployments.

        The full URN format is:
          `{provider}/{version}/tenants/{tenant}/workspaces/{workspace}/{type}/{name}`

        For hierarchical (nested) resources, additional parent path segments are included:
          `seca.network/v1/tenants/tn-1/workspaces/ws-1/networks/my-net/route-tables/my-rt`

        ### Automatic Prefix Inference

        In most cases, the prefix of the URN can be automatically derived in the given context.
        To simplify usage, only the resource type and name might be specified as a reference
        using the `<type>/<name>` notation. The suffix can be made more specific by adding
        additional segments separated by slashes.

        The prefix is automatically inferred from the context. For example, if the resource is a
        block storage in the same workspace the reference can be specified as
        `block-storages/my-block-storage`. If the resource is a block storage in a different workspace, the
        reference can be specified as `workspaces/ws-1/block-storages/my-block-storage`.

        For automatic prefix inference, the following rules apply:
        - the version is inferred from the current resource version
        - the workspace is inferred from the current workspace
        - the region is inferred from the current region
        - the provider is inferred from the type and context of the usage

        The prefix inference is resolved on admission into the full URN format, which makes it
        mostly suitable for human use.
      maxLength: 255
      example: "seca.compute/v1/tenants/tn-1/workspaces/ws-1/instances/my-server"
      x-oapi-codegen-extra-tags:
        x-cel-rule-0: "self.size() <= 255"
        x-cel-message-0: "referenceURN must be at most 255 characters long"

    ReferenceObject:
      type: object
      description: |
        A reference to a resource using an object. The object contains the
        same information as the ReferenceURN, but is represented as a structured object.
        The advantage of this representation is that it can be used to reference
        resources in different workspaces or regions without the need to specify
        the full URN.
      required:
      - resource
      properties:
        region:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Region of the resource. If not set, the region is inferred from the context.
          maxLength: 64
          example: "eu-central-1"
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() <= 64"
            x-cel-message-0: "reference.region must be at most 64 characters long"
        provider:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Provider of the resource. If not set, the provider is inferred from the context.
          maxLength: 64
          example: "seca.compute/v1"
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() <= 64"
            x-cel-message-0: "reference.provider must be at most 64 characters long"
        tenant:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Tenant of the resource. If not set, the tenant is inferred from the context.
          maxLength: 64
          example: "tenant-1"
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() <= 64"
            x-cel-message-0: "reference.tenant must be at most 64 characters long"
        workspace:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Workspace of the resource. If not set, the workspace is inferred from the context.
          maxLength: 64
          example: "workspace-1"
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() <= 64"
            x-cel-message-0: "reference.workspace must be at most 64 characters long"
        resource:
          type: string
          description: |
            Resource-specific path identifying the resource within its workspace context.
            This is the segment of the full URN after the provider, version, tenant, and
            workspace parts. For a flat resource it is `<type>/<name>`, and for hierarchical
            (nested) resources it includes the parent path segments:
              `networks/<network-name>/route-tables/<rt-name>`
            The provider, tenant, and workspace can be specified as separate fields in this
            object; they do not need to be repeated here.
          maxLength: 256
          example: "instances/my-server"
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() <= 256"
            x-cel-message-0: "reference.resource must be at most 256 characters long"

    PermissionMetadata:
      type: object
      readOnly: true
      description: Metadata for permission management
      required:
      - provider
      - resource
      - verb
      properties:
        provider:
          type: string
          maxLength: 64
          example: "seca.compute/v1"
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() <= 64"
            x-cel-message-0: "metadata.provider must be at most 64 characters long"
        resource:
          type: string
          maxLength: 256
          example: "tenants/tn-1/workspaces/ws-1/instances/my-server"
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() <= 256"
            x-cel-message-0: "metadata.resource must be at most 256 characters long"
        verb:
          type: string
          maxLength: 7
          example: get
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() <= 7"
            x-cel-message-0: "metadata.verb must be at most 7 characters long"
      example:
        provider: "seca.compute/v1"
        resource: "tenants/tn-1/workspaces/ws-1/instances/my-server"
        verb: get

    ModificationMetadata:
      type: object
      readOnly: true
      description: Base metadata for all resources with optional region references
      required:
      - createdAt
      - lastModifiedAt
      - resourceVersion
      properties:
        createdAt:
          type: string
          format: date-time
          description: Indicates the time when the resource was created. The field is set by the provider and should not be modified by the user.
        deletedAt:
          type: string
          format: date-time
          description: If set, indicates the time when the resource was marked for deletion. Resources with this field set are considered pending deletion.
        lastModifiedAt:
          type: string
          format: date-time
          description: Indicates the time when the resource was created or last modified. Field is used for "If-Unmodified-Since" logic for concurrency control. The provider guarantees that a modification on a single resource can happen only once every millisecond.
        resourceVersion:
          type: integer
          description: Incremented on every modification of the resource. Used for optimistic concurrency control.
          minimum: 1
          format: int64
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self >= 1"
            x-cel-message-0: "metadata.resourceVersion must be greater than or equal to 1"

    NameMetadata:
      type: object
      readOnly: true
      required:
      - name
      description: Metadata for resource names
      properties:
        name:
          type: string
          description: |
            Resource identifier in dash-case (kebab-case) format. Must start and end with an alphanumeric character.
            Can contain lowercase letters, numbers, and hyphens. Multiple segments can be joined with dots.
            Each segment follows the same rules.
          minLength: 1
          maxLength: 128
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$'
          example: "resource-name"
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.matches('^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$')"
            x-cel-message-0: "metadata.name must be in dash-case format, can contain lowercase letters, numbers, hyphens and dots, and must start and end with an alphanumeric character"
            x-cel-rule-1: "self.size() >= 1 && self.size() <= 128"
            x-cel-message-1: "metadata.name must be between 1 and 128 characters long"

    UserResourceMetadata:
      type: object
      description: Metadata for user-defined resource properties
      properties:
        labels:
          $ref: '#/components/schemas/Labels'
        annotations:
          $ref: '#/components/schemas/Annotations'
        extensions:
          $ref: '#/components/schemas/Extensions'


    Extensions:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to add extensions.
        Extensions are subject to validation by the CSP, and any value that is not accepted will be rejected during admission.
      additionalProperties:
        type: string

    Labels:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to
        organize and categorize resources. They can be used to filter resources.
        The number of labels is eventually limited by the CSP.
      additionalProperties:
        type: string
        maxLength: 63
        x-oapi-codegen-extra-tags:
          x-cel-rule-0: "self.size() <= 63"
          x-cel-message-0: "label values must be at most 63 characters long"
      example:
        env: production

    Annotations:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to add annotations.
        The number of annotations is eventually limited by the CSP.
      additionalProperties:
        type: string
        maxLength: 1024
        x-oapi-codegen-extra-tags:
          x-cel-rule-0: "self.size() <= 1024"
          x-cel-message-0: "annotation values must be at most 1024 characters long"
      example:
        description: "Human readable description"

    SystemResourceMetadata:
      type: object
      description: Metadata for user-defined resource properties
      properties:
        labels:
          $ref: '#/components/schemas/Labels'
        annotations:
          $ref: '#/components/schemas/Annotations'
        extensions:
          $ref: '#/components/schemas/Extensions'

    TenantMetadata:
      type: object
      description: Metadata for resources with tenant constraints
      readOnly: true
      required:
      - tenant
      properties:
        tenant:
          type: string
          description: Tenant identifier
          maxLength: 64
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() <= 64"
            x-cel-message-0: "metadata.tenant must be at most 64 characters long"

    WorkspaceMetadata:
      type: object
      description: Metadata for resources with workspace constraints
      readOnly: true
      required:
      - workspace
      properties:
        workspace:
          type: string
          description: Workspace identifier
          maxLength: 64
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() <= 64"
            x-cel-message-0: "metadata.workspace must be at most 64 characters long"

    NetworkMetadata:
      type: object
      description: Metadata for resources with network constraints
      readOnly: true
      required:
      - network
      properties:
        network:
          type: string
          description: Network identifier
          maxLength: 64
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() <= 64"
            x-cel-message-0: "metadata.network must be at most 64 characters long"

    RegionalMetadata:
      type: object
      description: Metadata for regional resources
      readOnly: true
      required:
      - region
      properties:
        region:
          type: string
          description: Reference to the region where the resource is located
          maxLength: 64
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() <= 64"
            x-cel-message-0: "metadata.region must be at most 64 characters long"
          example: "eu-central-1"

    Status:
      type: object
      readOnly: true
      description: Current status of the resource
      required:
      - conditions
      properties:
        state:
          x-go-type-skip-optional-pointer: true
          allOf:
          - $ref: '#/components/schemas/ResourceState'
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/StatusCondition"

    ResourceState:
      type: string
      description: |
        Current phase of the resource:
        - pending: not available, waiting for other resources
        - creating: not available, creation started
        - active: available for data layer usage
        - updating: available for data layer usage
        - deleting: maybe still available for data layer user, can fail any moment
        - error: failed to fulfill the request; would be related to provider issue or customer related input.
      enum:
      - pending
      - creating
      - active
      - updating
      - deleting
      - error
      x-enumNames:
      - ResourceStatePending
      - ResourceStateCreating
      - ResourceStateActive
      - ResourceStateUpdating
      - ResourceStateDeleting
      - ResourceStateError
      example: "active"

    StatusCondition:
      type: object
      description: |
        StatusCondition describes the state of a resource at a certain point.
        Conditions are provider-specific and can represent different states depending on the
        resource type and provider implementation.
      required:
      - state
      - lastTransitionAt
      properties:
        state:
          $ref: '#/components/schemas/ResourceState'
        lastTransitionAt:
          type: string
          format: date-time
          description: |
            LastTransitionAt is the last time the condition transitioned from one
            status to another. This should be when the underlying condition changed.
            If that is not known, then using the time when the API field changed is
            acceptable.
        type:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Type of condition. The condition type is provider-specific and should
            reflect the specific states relevant to your resource.
        reason:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            The reason for the condition's last transition in CamelCase.
            The specific set of reason values is provider-specific and should be
            documented by the provider.
          maxLength: 1024
          pattern: '^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$'
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.matches('^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$')"
            x-cel-message-0: "statusCondition.reason must be in CamelCase and can contain letters, numbers, underscores, commas and colons"
            x-cel-rule-1: "self.size() <= 1024"
            x-cel-message-1: "statusCondition.reason must be at most 1024 characters long"
        message:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            A human-readable message indicating details about the transition.
          maxLength: 32768
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() <= 32768"
            x-cel-message-0: "statusCondition.message must be at most 32768 characters long"
      example:
        state: active
        lastTransitionAt: "2024-11-21T14:39:22Z"

    ResponseMetadata:
      description: |
        Metadata for response objects.
      allOf:
      - $ref: '#/components/schemas/PermissionMetadata'
      - type: object
        readOnly: true
        properties:
          skipToken:
            type: string
            description: Opaque cursor to get the next page. Field is omitted when there are no more pages available.
            maxLength: 5
      example:
        skipToken: "false"
        provider: "seca.compute/v1"
        resource: "tenants/tn-1/workspaces/ws-1/instances/my-server"
        verb: get
