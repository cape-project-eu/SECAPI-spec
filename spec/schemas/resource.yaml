ResourceMetadata:
  description: |
    Metadata for all resources with type and name information.
  allOf:
  - $ref: '#/NameMetadata'
  - $ref: '#/TypeMetadata'
  example:
    name: "resource-name"
    apiVersion: "v1"
    kind: "workspace"

GlobalResourceMetadata:
  description: |
    Metadata for global resources with name, permission, modification, type, and tenant information.
  allOf:
  - $ref: '#/NameMetadata'
  - $ref: '#/PermissionMetadata'
  - $ref: '#/ModificationMetadata'
  - $ref: '#/TypeMetadata'
  - $ref: '#/TenantMetadata'

RegionalResourceMetadata:
  description: |
    Metadata for regional resources with name, permission, modification, type, tenant, and region information.
  allOf:
  - $ref: '#/NameMetadata'
  - $ref: '#/PermissionMetadata'
  - $ref: '#/ModificationMetadata'
  - $ref: '#/TypeMetadata'
  - $ref: '#/TenantMetadata'
  - $ref: '#/RegionalMetadata'

ZonalResourceMetadata:
  description: |
    Metadata for zonal resources with name, permission, modification, type, tenant, region, and zone information.
  allOf:
  - $ref: '#/NameMetadata'
  - $ref: '#/PermissionMetadata'
  - $ref: '#/ModificationMetadata'
  - $ref: '#/TypeMetadata'
  - $ref: '#/TenantMetadata'
  - $ref: '#/RegionalMetadata'
  - $ref: '#/ZonalMetadata'

TypeMetadata:
  type: object
  readOnly: true
  required:
  - apiVersion
  - kind
  description:  |
    Metadata for all resources with type information.
  properties:
    apiVersion:
      type: string
      description: API version of the resource
      default: v1
    kind:
      type: string
      description: Type of the resource
      enum:
      - activity-log
      - block-storage
      - image
      - instance
      - instance-sku
      - network
      - network-load-balancer
      - network-sku
      - nic
      - object-storage-account
      - public-ip
      - region
      - role
      - role-assignment
      - routing-table
      - security-group
      - security-group-rule
      - storage-sku
      - subnet
      - workspace
    ref:
      $ref: '#/Reference'

Reference:
  type: string
  description: |
    A unique resource name used to reference this resource in other resources. The reference
    is represented as the full URN (Uniform Resource Name) of the resource. In most cases,
    the prefix of the URN can be automatically derived from the provider. To simplify usage,
    only the resource name can be specified as a reference using the prefix `.../` to enable
    automatic prefix inference.
  example: .../resource-a1b2c3

PermissionMetadata:
  type: object
  readOnly: true
  description: Metadata for permission management
  required:
  - scope
  - resource
  - verb
  properties:
    scope:
      type: string
      example: "workspace/production"
    resource:
      type: string
      example: "seca.compute/instances/my-server"
    verb:
      type: string
      example: get
  example:     
    scope: "workspace/production"
    resource: "seca.compute/instances/my-server"
    verb: get  

ModificationMetadata:
  type: object
  readOnly: true
  description: Base metadata for all resources with optional region references
  required:
  - lastModifiedTimestamp
  - deletionTimestamp
  - resourceVersion
  properties:
    deletionTimestamp:
      type: string
      format: date-time
      description: If set, indicates the time when the resource was marked for deletion. Resources with this field set are considered pending deletion.
    lastModifiedTimestamp:
      type: string
      format: date-time
      description: Indicates the time when the resource was created or last modified. Field is used for "If-Unmodified-Since" logic for concurrency control. The provider guarantees that a modification on a single resource can happen only once every millisecond.
    resourceVersion:
      type: integer
      description: Incremented on every modification of the resource. Used for optimistic concurrency control.

NameMetadata:
  type: object
  readOnly: true
  required:
  - name
  description: Metadata for resource names
  properties:
    name:
      type: string
      description: |
        Resource identifier in dash-case (kebab-case) format. Must start and end with an alphanumeric character.
        Can contain lowercase letters, numbers, and hyphens. Multiple segments can be joined with dots.
        Each segment follows the same rules.
      minLength: 1
      maxLength: 128
      pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$'
      example: "resource-name"

UserResourceMetadata:
  type: object
  description: Metadata for user-defined resource properties
  properties:
    labels:
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to
        organize and categorize resources. They can be used to filter resources.
        The number of labels is eventually limited by the CSP.
      additionalProperties:
        type: string
      example:
        env: production
    annotations:
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to add annotations.
        The number of annotations is eventually limited by the CSP.
      additionalProperties:
        type: string
      example:
        description: "Human readable description"

TenantMetadata:
  type: object
  description: Metadata for global resources with tenant constraints
  readOnly: true
  required:
  - tenant
  properties:
    tenant:
      type: string
      description: Tenant identifier

RegionalMetadata:
  type: object
  description: Metadata for regional resources
  readOnly: true
  required:
  - region
  properties:
    region:
      type: string
      description: Reference to the region where the resource is located
    workspace:
      type: string
      description: Workspace identifier

ZonalMetadata:
  type: object
  description: Metadata for zonal resources
  readOnly: true
  required:
  - zone
  properties:
    zone:
      $ref: './region.yaml#/Zone'

Status:
  type: object
  readOnly: true
  description: Current status of the resource
  required:
  - conditions
  properties:
    state:
      $ref: '#/ResourceState'
    conditions:
      type: array
      items:
        $ref: "#/StatusCondition"

ResourceState:
  type: string
  description: |
    Current phase of the resource:
    - pending: not available, waiting for other resources
    - creating: not available, creation started
    - active: available for data layer usage
    - updating: available for data layer usage
    - deleting: maybe still available for data layer user, can fail any moment
    - suspended: not available, provider specific behavior (payment issue, user decided to suspend)
    - error: failed to fulfill the request; would be related to provider issue or customer related input.
  enum:
  - pending
  - creating
  - active
  - updating
  - deleting
  - suspended
  - error
  example: "active"

StatusCondition:
  type: object
  description: |
    StatusCondition describes the state of a resource at a certain point.
    Conditions are provider-specific and can represent different states depending on the
    resource type and provider implementation.
  required:
  - state
  - lastTransitionTime
  properties:
    type:
      type: string
      description: |
        Type of condition. The condition type is provider-specific and should
        reflect the specific states relevant to your resource.
    state:
      $ref: '#/ResourceState'
    lastTransitionTime:
      type: string
      format: date-time
      description: |
        LastTransitionTime is the last time the condition transitioned from one
        status to another. This should be when the underlying condition changed.
        If that is not known, then using the time when the API field changed is
        acceptable.
    reason:
      type: string
      description: |
        The reason for the condition's last transition in CamelCase.
        The specific set of reason values is provider-specific and should be
        documented by the provider.
      maxLength: 1024
      pattern: '^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$'
    message:
      type: string
      description: |
        A human-readable message indicating details about the transition.
      maxLength: 32768
  example:
    state: active
    lastTransitionTime: "2024-11-21T14:39:22Z"

ResponseMetadata:
  description: |
    Metadata for response objects.
  allOf:
  - $ref: '#/PermissionMetadata'
  - type: object
    properties:
      skipToken:
        type: string
        description: Opaque cursor to get the next page. Field is omitted when there are no more pages available.
  example:
    skipToken: "false"
    scope: "workspace/production"
    resource: "seca.compute/instances/my-server"
    verb: get  
