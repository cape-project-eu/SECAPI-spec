SystemRole:
  type: string
  enum:
    - ADMIN
    - WORKSPACE_ADMIN
    - WORKSPACE_EDITOR
    - WORKSPACE_VIEWER
  description: |
    Predefined system roles that cannot be modified:
    * ADMIN - Full system access, can manage workspaces
    * WORKSPACE_ADMIN - Full access within a workspace
    * WORKSPACE_EDITOR - Can edit all resources in workspace
    * WORKSPACE_VIEWER - Can view all resources in workspace

Role:
  description: |
    Role represents a set of permissions that can be assigned to users.
  allOf:
  - $ref: './resource.yaml#/UserResourceMetadata'
  - type: object
    required:
    - spec
    properties:
      metadata:
        $ref: './resource.yaml#/GlobalResourceMetadata'
      spec:
        $ref: "#/RoleSpec"
      status:
        $ref: "#/RoleStatus"

RoleSpec:
  type: object
  description: |
    Role specification, including permissions and scope.
    Roles are used to define access control policies for users accounts.
  properties:
    permissions:
      type: array
      items:
        $ref: "#/Permission"
      description: List of permissions granted by this role
      example:
      - scopes: ["workspaces/production"]
        resources:
        - "seca.compute/instances"
        - "seca.compute/instances/*"
        - "seca.network/networks"
        - "seca.network/networks/*"
        verb: ["put", "delete"]
      - scopes: ["workspaces/develop"]
        resources:
        - "seca.compute/instances"
        - "seca.compute/instances/*"
        - "seca.network/networks"
        - "seca.network/networks/*"
        verb: ["get"]

Permission:
  type: object
  description: |
    Permission specification, including scopes, resources, and operations.
    Permissions are used to define access control policies for user accounts.
  properties:
    scopes:
      type: array
      items:
        type: string
      description: List of Scopes to whom the roles are assigned
      example: ["workspaces/develop", "workspaces/production"]
    resources:
      type: array
      items:
        type: string
      description: List of assigned role names
      example: ["project-manager", "workspace-viewer"]
    verb:
      type: array
      items:
        type: string
      description: List of operations
      example: ["read", "write"]

RoleStatus:
  $ref: "./resource.yaml#/Status"

RoleAssignment:
  description: |
    Role assignment for a user account. The role is assigned to the user account in the context of the specified scopes.
  allOf:
  - $ref: './resource.yaml#/UserResourceMetadata'
  - type: object
    required:
    - spec
    properties:
      metadata:
        $ref: './resource.yaml#/GlobalResourceMetadata'
      spec:
        $ref: "#/RoleAssignmentSpec"
      status:
        $ref: "#/RoleAssignmentStatus"

RoleAssignmentSpec:
  type: object
  description: |
    Role assignment for a user account. The role is assigned to the user account in the context of the specified scopes.
  properties:
    subs:
      type: array
      items:
        type: string
      description: List of subject IDs (from JWT) to whom the roles are assigned
      example: ["user1@example.com", "service-account-1"]
    roles:
      type: array
      items:
        type: string
      description: List of assigned role names
      example: ["project-manager", "workspace-viewer"]

RoleAssignmentStatus:
  $ref: "./resource.yaml#/Status"
