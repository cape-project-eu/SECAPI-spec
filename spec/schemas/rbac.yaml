components:
  schemas:
    Role:
      description: |
        Role represents a set of permissions that can be assigned to users.
      allOf:
      - $ref: './resource.yaml#/components/schemas/UserResourceMetadata'
      - type: object
        required:
        - spec
        properties:
          metadata:
            $ref: './resource.yaml#/components/schemas/GlobalTenantResourceMetadata'
          spec:
            $ref: "#/components/schemas/RoleSpec"
          status:
            $ref: "#/components/schemas/RoleStatus"

    RoleSpec:
      type: object
      description: |
        Role specification defined as a list of permissions.
        Roles are used to define access control policies for
        a user account using a role assignment.
      required:
      - permissions
      properties:
        permissions:
          type: array
          minItems: 1
          maxItems: 256
          items:
            $ref: "#/components/schemas/Permission"
          description: List of permissions granted by this role
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-min-items: "1"
            x-kubebuilder-validation-max-items: "256"
          example:
          - provider: "seca.storage/v1"
            resources:
            - "images/*"
            - "block-storages/*"
            verb: ["get", "list"]
          - provider: "seca.compute/v1"
            resources:
            - "instances/*"
            verb: ["get", "list"]
          - provider: "seca.network/v1"
            resources:
            - "networks/*"
            - "subnets/*"
            - "route-tables/*"
            - "nics/*"
            - "internet-gateways/*"
            - "security-groups/*"
            - "public-ips/*"
            verb: ["get", "list"]

    Permission:
      type: object
      description: |
        Permission specification, including providers, resources, and verbs.
        Permissions are used to define access control policies for user accounts.
      required:
      - provider
      - resources
      - verb
      properties:
        provider:
          type: string
          description: |
            The provider for which the resource and verbs are defined.
          minLength: 1
          maxLength: 64
          example: 'seca.storage/v1'
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-min-length: "1"
            x-kubebuilder-validation-max-length: "64"
        resources:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 256
            x-oapi-codegen-extra-tags:
              x-kubebuilder-validation-max-length: "256"
          description: |
            The resources are the specific resources that the permission applies to.
            The resource can be a wildcard `*` to represent all resources or a
            specific resource type. For example, `images/my-image` or
            `images/*`.
          example: ["images/*", "skus/*"]
          maxItems: 256
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-items-min-length: "1"
            x-kubebuilder-validation-items-max-length: "256"
            x-kubebuilder-validation-min-items: "1"
            x-kubebuilder-validation-max-items: "256"
        verb:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 7
            x-oapi-codegen-extra-tags:
              x-kubebuilder-validation-max-length: "7"
          description: |
            The verb is a string that represents the action to be performed on a resource.
            The standard operations are defined as `get`, `put`, `list`, `delete`. If the
            resource has additional actions they can to be permitted individually as
            verb and action in the form `<verb>:<action>`. For example, `post.start`,
            `post.stop`, `post.restart` or with a wildcard for all actions `post`.
          example: ["read", "write"]
          maxItems: 16
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-items-min-length: "1"
            x-kubebuilder-validation-items-max-length: "7"
            x-kubebuilder-validation-min-items: "1"
            x-kubebuilder-validation-max-items: "16"

    RoleStatus:
      $ref: "./resource.yaml#/components/schemas/Status"

    RoleAssignment:
      description: |
        Role assignment for a user account. The role is assigned to the user account in the context of the specified scopes.
      allOf:
      - $ref: './resource.yaml#/components/schemas/UserResourceMetadata'
      - type: object
        required:
        - spec
        properties:
          metadata:
            $ref: './resource.yaml#/components/schemas/GlobalTenantResourceMetadata'
          spec:
            $ref: "#/components/schemas/RoleAssignmentSpec"
          status:
            $ref: "#/components/schemas/RoleAssignmentStatus"

    RoleAssignmentSpec:
      type: object
      description: |
        Role assignment for a user account. The role is assigned to the user account in the context of the specified scopes.
      required:
      - subs
      - scopes
      - roles
      properties:
        subs:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 128
            x-oapi-codegen-extra-tags:
              x-kubebuilder-validation-max-length: "128"
          description: |
            List of subject IDs (from JWT) to whom the roles are assigned,
            A wildcard `*` can be used to represent all users of the tenant scopes
          example: ["user1@example.com", "service-account-1"]
          maxItems: 256
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-items-min-length: "1"
            x-kubebuilder-validation-items-max-length: "128"
            x-kubebuilder-validation-min-items: "1"
            x-kubebuilder-validation-max-items: "256"
        scopes:
          type: array
          minItems: 1
          maxItems: 256
          items:
            $ref: "#/components/schemas/RoleAssignmentScope"
          description: List of scopes (e.g., tenant, workspace) for the role assignment
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-min-items: "1"
            x-kubebuilder-validation-max-items: "256"
        roles:
          type: array
          minItems: 1
          maxItems: 32
          items:
            type: string
            minLength: 1
            maxLength: 64
            x-oapi-codegen-extra-tags:
              x-kubebuilder-validation-max-length: "64"
          description: List of assigned role names
          example: ["project-manager", "workspace-viewer"]
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-items-min-length: "1"
            x-kubebuilder-validation-items-max-length: "64"
            x-kubebuilder-validation-min-items: "1"
            x-kubebuilder-validation-max-items: "32"

    RoleAssignmentScope:
      type: object
      description: |
        Role assignment scope, including the workspaces, regions and tenants.
      properties:
        tenants:
          type: array
          x-go-type-skip-optional-pointer: true
          maxItems: 64
          description: |
            Optionally, can be opened to all tenants or restricted to a specific tenant.
            If not specified, the role assignment is valid for the current tenant.
          example: ['tenant-1']
          items:
            type: string
            description: |
              Tenant ID for the role assignment. A `*` wildcard can be used
              to represent all tenants. This allows the role assignment to
              be applied to other tenants if needed.
            minLength: 1
            maxLength: 64
            x-oapi-codegen-extra-tags:
              x-kubebuilder-validation-max-length: "64"
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-items-min-length: "1"
            x-kubebuilder-validation-items-max-length: "64"
            x-kubebuilder-validation-max-items: "64"
        regions:
          type: array
          x-go-type-skip-optional-pointer: true
          maxItems: 64
          description: |
            Optionally, a restriction can be applied to the region
            where the role assignment is valid. If not specified,
            the role assignment is valid for all regions.
          example: ['region-1']
          items:
            type: string
            description: |
              Region ID for the role assignment
            minLength: 1
            maxLength: 64
            x-oapi-codegen-extra-tags:
              x-kubebuilder-validation-max-length: "64"
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-items-min-length: "1"
            x-kubebuilder-validation-items-max-length: "64"
            x-kubebuilder-validation-max-items: "64"
        workspaces:
          type: array
          x-go-type-skip-optional-pointer: true
          maxItems: 256
          description: |
            Optionally, a restriction can be applied to the workspace
            where the role assignment is valid. If not specified,
            the role assignment is valid for all workspaces.
          example: ['workspace-1']
          items:
            type: string
            description: |
              Workspace ID for the role assignment.
            minLength: 1
            maxLength: 64
            x-oapi-codegen-extra-tags:
              x-kubebuilder-validation-max-length: "64"
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-items-min-length: "1"
            x-kubebuilder-validation-items-max-length: "64"
            x-kubebuilder-validation-max-items: "256"

    RoleAssignmentStatus:
      $ref: "./resource.yaml#/components/schemas/Status"
