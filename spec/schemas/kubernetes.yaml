components:
  schemas:
    KubernetesCluster:
      description: |
        Represents a kubernetes cluster resource. A cluster is
        accessible from the internet and can be used to deploy applications
        that require external access.
      allOf:
      - $ref: './resource.yaml#/components/schemas/UserResourceMetadata'
      - type: object
        required:
        - spec
        properties:
          metadata:
            $ref: './resource.yaml#/components/schemas/RegionalWorkspaceResourceMetadata'
          spec:
            $ref: '#/components/schemas/KubernetesClusterSpec'
          status:
            $ref: '#/components/schemas/KubernetesClusterStatus'

    KubernetesClusterSpec:
      type: object
      description: |
        Specification of the  kubernetes cluster, including its configuration
        and network settings.

        Changing the sku of the cluster will cause the cluster to be recreated.
      required:
      - skuRef
      properties:
        skuRef:
          allOf:
          - $ref: './resource.yaml#/components/schemas/Reference'
          description: Reference to the SKU of the Kubernetes cluster.
          example:
            resource: "tenants/seca/skus/xl"
        restrictKubernetesApi:
          description: |
            Restrict access to the Kubernetes API to specific IP addresses or ranges.
            This is a security feature to limit access to the cluster. If not specified,
            the Kubernetes API is accessible from any IP address. Nodes that are
            part of the cluster are always allowed to access the Kubernetes API.
          type: array
          x-go-type-skip-optional-pointer: true
          items:
            type: string
            description: |
              IP address or CIDR range to restrict access to the Kubernetes API.
              The IP address or CIDR can be for IPv4 or IPv6.
            maxLength: 45
          example:
          - "1.2.3.4/32"
          - "2002::1234:abcd:ffff:c0a8:101/64"
          - "1.2.3.4"
          - "2002::1234:abcd:ffff:c0a8:101"
        podCidr:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            CIDR range for the pod network. This is used to allocate IP addresses
            for pods in the cluster. The CIDR must be a valid IPv4 or IPv6 CIDR.
            If not specified, a default provider CIDR will be used.
          example: "192.168.0.0/24"
        serviceCidr:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            CIDR range for the service network. This is used to allocate IP addresses
            for services in the cluster. The CIDR must be a valid IPv4 or IPv6 CIDR.
            If not specified, a default provider CIDR will be used.
          example: "100.64.0.0/18"

    KubernetesClusterStatus:
      description: |
        Represents the status of the  kubernetes cluster.
      allOf:
      - $ref: "./resource.yaml#/components/schemas/Status"
      - type: object
        readOnly: true
        properties:
          kubeConfig:
            type: string
            x-go-type-skip-optional-pointer: true
            description: |
              The kube config file for the cluster. This file is used to configure
              access to the cluster using kubectl or other Kubernetes clients.
            maxLength: 65536
            example: "---\n..."

    KubernetesNodePool:
      description: |
        Represents a Node Pool resource in a Kubernetes cluster. A Node Pool is a group of
        nodes with the same configuration, including instance SKU, network configuration,
        and security group settings. Node Pools are used to manage the scaling and
        lifecycle of nodes in a Kubernetes cluster.
      allOf:
      - $ref: './resource.yaml#/components/schemas/UserResourceMetadata'
      - type: object
        required:
        - spec
        properties:
          metadata:
            $ref: './resource.yaml#/components/schemas/RegionalWorkspaceResourceMetadata'
          spec:
            $ref: '#/components/schemas/KubernetesNodePoolSpec'
          status:
            $ref: '#/components/schemas/KubernetesNodePoolStatus'

    KubernetesNodePoolSpec:
      type: object
      description: |
        Specification of the  kubernetes node pool, including its configuration
        and network settings. Since the node pool is, all nodes in the pool
        have a IP address and are accessible from the internet.
      required:
      - instances
      - nodeTemplate
      properties:
        instances:
          description: |
            The number of instances in the node pool. This field is required to
            specify the number of nodes in the node pool.
          type: integer
          minimum: 1
          maximum: 5000
          example: 3
        nodeTemplate:
          $ref: '#/components/schemas/KubernetesNodeTemplate'
        taints:
          type: array
          x-go-type-skip-optional-pointer: true
          description: |
            List of taints to apply to the nodes in the node pool. Taints are used
            to mark nodes as unsuitable for certain workloads, allowing for more
            fine-grained control over scheduling.
          items:
            $ref: '#/components/schemas/KubernetesNodeTaint'

    KubernetesNodeTemplate:
      type: object
      description: |
        Template for creating nodes in the node pool. The template includes
        the instance SKU, subnet, and zone in which the nodes will be created.
        The SKU must be one of the available compute SKUs in the region.
      required:
      - skuRef
      - subnetRef
      - zone
      - rootVolume
      properties:
        skuRef:
          allOf:
          - $ref: './resource.yaml#/components/schemas/Reference'
          description: Reference to the SKU of the node instances.
          example:
            provider: seca.compute/v1
            resource: tenants/seca/skus/xl
            ref: seca.compute/v1/tenants/seca/skus/xl
        subnetRef:
          allOf:
          - $ref: './resource.yaml#/components/schemas/Reference'
          description: Reference to the NIC attached to the node instances.
          example:
            provider: seca.network/v1
            resource: subnets/k8s-nodes-a
            ref: seca.network/v1/tenants/tn-1/workspaces/ws-1/subnets/k8s-nodes-a
        zone:
          $ref: './region.yaml#/components/schemas/Zone'
        securityGroupRef:
          allOf:
          - $ref: './resource.yaml#/components/schemas/Reference'
          description: Reference to the security group associated with the node instances.
          example:
            provider: seca.network/v1
            resource: security-groups/k8s-nodes
            ref: seca.network/v1/tenants/tn-1/workspaces/ws-1/security-groups/k8s-nodes
        rootVolume:
          $ref: '#/components/schemas/KubernetesNodeRootVolume'
      example:
        skuRef:
          provider: seca.compute/v1
          resource: tenants/seca/skus/xl
          ref: seca.compute/v1/tenants/seca/skus/xl
        subnetRef:
          provider: seca.network/v1
          resource: subnets/k8s-nodes-a
          ref: seca.network/v1/tenants/tn-1/workspaces/ws-1/subnets/k8s-nodes-a
        zone: a
        securityGroupRef:
          provider: seca.network/v1
          resource: security-groups/k8s-nodes
          ref: seca.network/v1/tenants/tn-1/workspaces/ws-1/security-groups/k8s-nodes
        rootVolume:
          skuRef:
            provider: seca.storage/v1
            resource: tenants/seca/skus/le500
            ref: seca.storage/v1/tenants/seca/skus/le500
          sizeGB: 100

    KubernetesNodeTaint:
      type: object
      description: |
        Represents a taint applied to the nodes in the node pool. Taints are used
        to control which pods can be scheduled on the nodes. A taint consists of a
        key, value, and effect.
      required:
      - key
      - value
      - effect
      properties:
        key:
          type: string
          description: |
            The key of the taint. The key is used to identify the taint and is used
            in conjunction with the value and effect.
          example: "example-key"
          maxLength: 63
        value:
          type: string
          description: |
            The value of the taint. The value is used to identify the taint and is used
            in conjunction with the key and effect.
          example: "example-value"
          maxLength: 63
        effect:
          type: string
          enum:
          - NoSchedule
          - PreferNoSchedule
          - NoExecute
          x-enumNames:
          - KubernetesNodeTaintEffectNoSchedule
          - KubernetesNodeTaintEffectPreferNoSchedule
          - KubernetesNodeTaintEffectNoExecute
          description: |
            The effect of the taint. The effect determines how the taint is applied to
            the nodes in the node pool. For details on the effects, see the
            (kubernetes documentation on taints and tolerations)[https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/].
          example: "NoSchedule"

    KubernetesNodeRootVolume:
      type: object
      description: |
        Root volume for the node. The root volume is used to store the operating
        system and other software required to run the node.

        The SKU must be one of the available block storage SKUs in the region.
      required:
      - skuRef
      - sizeGB
      properties:
        skuRef:
          allOf:
          - $ref: './resource.yaml#/components/schemas/Reference'
          description: Reference to the SKU of the block storage created to store the root volume.
          example:
            provider: seca.storage/v1
            resource: tenats/seca/skus/le500
        sizeGB:
          description: |
            Size of the root volume in GB. The size is recommended to be at least 100GB.
          type: integer
          example: 100
          minimum: 20
      example:
        skuRef:
          resource: tenants/seca/skus/le500
        sizeGB: 100

    KubernetesNodePoolStatus:
      description: |
        Represents the status of the  kubernetes node pool. The status
        represents if the instances of the node pool are provisioned to the
        cluster.
      allOf:
      - $ref: './resource.yaml#/components/schemas/Status'
      - type: object
        readOnly: true
        properties:
          nodes:
            description: |
              List of nodes in the Node Pool. Each node is represented by its
              reference to a compute instance.
            type: array
            x-go-type-skip-optional-pointer: true
            items:
              allOf:
              - $ref: './resource.yaml#/components/schemas/Reference'
              description: Reference to the compute instance representing the node.
              example:
                provider: seca.compute/v1
                resource: instances/instance-123
