components:
  schemas:
    NetworkLoadBalancer:
      description: |
        Represents a Network Load Balancer resource. It is used to distribute incoming network traffic
        across multiple backend instances based on the specified frontend configuration.
      allOf:
      - $ref: './resource.yaml#/components/schemas/UserResourceMetadata'
      - type: object
        required:
        - spec
        properties:
          metadata:
            $ref: './resource.yaml#/components/schemas/RegionalWorkspaceResourceMetadata'
          spec:
            $ref: '#/components/schemas/NetworkLoadBalancerSpec'
          status:
            $ref: '#/components/schemas/NetworkLoadBalancerStatus'

    NetworkLoadBalancerPort:
        type: integer
        description: 'Load Balancer port to receive or forward the traffic'
        minimum: 1
        maximum: 65535
        example: 443
        x-oapi-codegen-extra-tags:
          x-cel-rule-0: "self >= 1 && self <= 65535"
          x-cel-message-0: "port must be between 1 and 65535"

    NetworkLoadBalancerSpec:
      type: object
      description: |
        Defines the specification for a Network Load Balancer. A Load Balancer can have multiple
        frontends, where each frontend may target multiple backend instances. Frontend ports and
        protocols must be unique to ensure proper routing. The NIC associated with the proxy
        determines whether the Load Balancer is internal or external.
      required:
      - nicRef
      - frontends
      properties:
        nicRef:
          allOf:
          - $ref: './resource.yaml#/components/schemas/Reference'
          description: Reference to the NIC attached to the load balancer.
          example:
            provider: seca.network/v1
            resource: nics/lb-1
            ref: seca.network/v1/tenants/tn-1/workspaces/ws-1/nics/lb-1
        securityGroupRef:
          allOf:
          - $ref: './resource.yaml#/components/schemas/Reference'
          description: Reference to the security group associated with this instance.
          example:
            provider: seca.network/v1
            resource: security-groups/sg-123
            ref: seca.network/v1/tenants/tn-1/workspaces/ws-1/security-groups/sg-123
        frontendPort:
          allOf:
          - $ref: '#/components/schemas/NetworkLoadBalancerPort'
          description: 'Frontend port to which the load balancer will be listening on'
        backendPort:
          allOf:
          - $ref: '#/components/schemas/NetworkLoadBalancerPort'
          description: 'Backend port to which the load balancer will be forwarding the traffic to'
        frontends:
          type: array
          items:
            $ref: '#/components/schemas/NetworkLoadBalancerFrontend'

    NetworkLoadBalancerStatus:
      description: |
        Represents the status of the Network Load Balancer. It provides information about
        the health of the backend instances and their readiness to handle traffic.
      allOf:
      - $ref: "./resource.yaml#/components/schemas/Status"
      - type: object
        readOnly: true
        properties:
          healthyMembers:
            description: 'List of healthy members'
            type: array
            x-go-type-skip-optional-pointer: true
            items:
              $ref: './resource.yaml#/components/schemas/Reference'

    NetworkLoadBalancerFrontend:
      type: object
      description: |
        Represents the frontend configuration of the LoadBalancer. Each frontend
        can have multiple targets, but the combination of port and protocol must
        be unique to ensure proper routing.
      required:
      - protocol
      - port
      - target
      properties:
        protocol:
          type: string
          description: 'Frontend Protocol to which the load balancer will be listening on'
          enum: [ tcp, udp, both ]
          x-enumNames:
          - LoadBalancerProtocolTCP
          - LoadBalancerProtocolUDP
          - LoadBalancerProtocolBoth
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self in ['tcp', 'udp', 'both']"
            x-cel-message-0: "spec.protocol must be one of 'tcp', 'udp', 'both'"
        port:
          allOf:
          - $ref: '#/components/schemas/NetworkLoadBalancerPort'
          description: 'Frontend port to which the load balancer will be listening on'
        target:
          $ref: '#/components/schemas/LoadBalancerTarget'

    LoadBalancerTarget:
      type: object
      description:
        The target of the LoadBalancer. It can be a set of instances nics.
        The port can be different from the frontend port, if omitted it will be the same.
        If no health check is specified, the LoadBalancer will not check the health of the backend instances.
      required:
      - members
      properties:
        algorithm:
          type: string
          x-go-type-skip-optional-pointer: true
          description: 'LoadBalancer algorithm to take a backend instance'
          enum: [ round-robin ]
          x-enumNames:
          - LoadBalancerAlgorithmRoundRobin
          default: round-robin
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self == null || self in ['round-robin']"
            x-cel-message-0: "spec.algorithm must be 'round-robin' or not set"
        port:
          allOf:
          - $ref: '#/components/schemas/NetworkLoadBalancerPort'
          description: 'Backend port to which the load balancer will be forwarding the traffic to'
        members:
          type: array
          description: 'Nic reference to the members as part of the LoadBalancerTarget'
          items:
            allOf:
            - $ref: './resource.yaml#/components/schemas/Reference'
            description: Reference to the NIC of a backend instance.
            example:
              provider: seca.network/v1
              resource: nics/nic-1
              ref: seca.network/v1/tenants/tn-1/workspaces/ws-1/nics/nic-1

        healthCheck:
          $ref: '#/components/schemas/LoadBalancerHealthCheck'
        proxyProtocol:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Specifies the proxy protocol version. The proxy protocol is used to
            pass client connection information to the backend instances.
            If not specified, the default is `none`.
          enum:
          - none
          - v2
          x-enumNames:
          - LoadBalancerProxyProtocolNone
          - LoadBalancerProxyProtocolV2
          default: none
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self == null || self in ['none', 'v2']"
            x-cel-message-0: "spec.proxyProtocol must be 'none', 'v2', or not set"
      example:
        members:
        - provider: 'seca.network/v1'
          resource: 'nics/nic-1'
        - provider: 'seca.network/v1'
          resource: 'nics/nic-2'
        healthCheck:
          interval: 10
          timeout: 5
          retry: 3

    LoadBalancerHealthCheck:
      type: object
      description: Optional port health check. It probes the port with protocol.
      required:
      - interval
      - timeout
      - retry
      properties:
        type:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Specifies the type of health check. A `connect` health check attempts
            to establish a connection to the specified port to determine its health.
          enum: [ connect ]
          x-enumNames:
          - LoadBalancerHealthCheckConnect
          default: connect
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self == null || self in ['connect']"
            x-cel-message-0: "healthCheck.type must be 'connect' or not set"
        interval:
          type: integer
          description: 'health check interval in seconds. It means after how many seconds it will take a new check'
          maximum: 86400
          example: 10
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self > 0 && self <= 86400"
            x-cel-message-0: "healthCheck.interval must be between 1 and 86400"
        timeout:
          type: integer
          description: 'health check in seconds. It means after how many seconds the attempt will be considered unhealthy'
          maximum: 600
          example: 5
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self > 0 && self <= 600"
            x-cel-message-0: "healthCheck.timeout must be between 1 and 600"
        retry:
          type: integer
          description: 'health check retry number after considered unhealthy a backend instance'
          maximum: 10
          example: 3
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self > 0 && self <= 10"
            x-cel-message-0: "healthCheck.retry must be between 1 and 10"
