components:
  schemas:
    NetworkSku:
      description: |
        Represents a Stock Keeping Unit (SKU) for network resources.

        Network SKUs define performance tiers for network bandwidth and characteristics.
        capabilities can be found also in the metadata.labels sections and are searchable.
      allOf:
      - $ref: "./resource.yaml#/components/schemas/SystemResourceMetadata"
      - type: object
        properties:
          metadata:
            $ref: "./resource.yaml#/components/schemas/SkuResourceMetadata"
          spec:
            $ref: "./network-sku.yaml#/components/schemas/NetworkSkuSpec"

    NetworkSkuSpec:
      type: object
      description: |
        Specification of the network SKU, including its bandwidth and packets per second.
      required:
      - bandwidth
      - packets
      properties:
        bandwidth:
          type: integer
          description: |
            The bandwidth in Mbps (Megabits per second).
          minimum: 1
          maximum: 800000
          example: 1000
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self >= 1 && self <= 800000"
            x-cel-message-0: "spec.bandwidth must be between 1 and 800000 Mbps"
        packets:
          type: integer
          description: |
            The number of packets per second (PPS) that the network SKU can handle.
          minimum: 1
          maximum: 200000000000
          example: 10000
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self >= 1 && self <= 200000000000"
            x-cel-message-0: "spec.packets must be between 1 and 200000000000 PPS"
