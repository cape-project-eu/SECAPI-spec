BlockStorage:
  description: Represents a block storage resource.
  allOf:
  - $ref: './resource.yaml#/UserResourceMetadata'
  - type: object
    required:
    - spec
    properties:
      metadata:
        $ref: './resource.yaml#/ZonalResourceMetadata'
      spec:
        $ref: '#/BlockStorageSpec'
      status:
        $ref: '#/BlockStorageStatus'

BlockStorageSpec:
  type: object
  description: |
    References the SKU used for this block.
    If a reference to the source image is used as the base for creating this block storage.
  required:
  - skuRef
  - sizeGB
  properties:
    skuRef:
      $ref: './resource.yaml#/Reference'
    sizeGB:
      type: integer
      example: 10
    sourceImageRef:
      $ref: './resource.yaml#/Reference'

BlockStorageStatus:
  description: |
    The status of the block storage.
  allOf:
  - $ref: './resource.yaml#/Status'
  - type: object
    readOnly: true
    description: |
      Conditions type `attachment` indicates the status of the volume attachment.
      The status can be `attached` or `detached`.
    required:
    - sizeGB
    properties:
      sizeGB:
        type: integer
        example: 10
      attachedTo:
        $ref: './resource.yaml#/Reference' 

VolumeReference:
  type: object
  description: Represents a connection between a Block Storage and an a user of the block storage.
  required:
  - deviceRef
  properties:
    deviceRef:
      $ref: './resource.yaml#/Reference'
    type:
      type: string
      description: The connection type depends on the type of device and type of block storage.
      enum:
      - virtio
      default: virtio
  example:
    deviceRef: ".../block-123"
    type: "virtio"

