components:
  schemas:
    BlockStorage:
      description: Represents a block storage resource.
      allOf:
      - $ref: './resource.yaml#/components/schemas/UserResourceMetadata'
      - type: object
        required:
        - spec
        properties:
          metadata:
            $ref: './resource.yaml#/components/schemas/RegionalWorkspaceResourceMetadata'
          spec:
            $ref: '#/components/schemas/BlockStorageSpec'
          status:
            $ref: '#/components/schemas/BlockStorageStatus'

    BlockStorageSpec:
      type: object
      description: |
        References the SKU used for this block.
        If a reference to the source image is used as the base for creating this block storage.
      required:
      - skuRef
      - sizeGB
      properties:
        skuRef:
          allOf:
          - $ref: './resource.yaml#/components/schemas/Reference'
          description: |
            Reference to the SKU of the block storage. The SKU is immutable after creation.
            If you want to change the SKU, you need to create a new block storage and migrate the data.
          example:
            resource: "tenants/seca/skus/n1k"
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self == oldSelf"
            x-cel-message-0: "spec.skuRef is immutable"
        sizeGB:
          type: integer
          description: Size of the block storage in GB.
          maximum: 1000000
          example: 10
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self >= oldSelf"
            x-cel-message-0: "spec.sizeGB cannot be decreased"
            x-cel-rule-1: "self > 0 && self <= 1000000"
            x-cel-message-1: "spec.sizeGB must be between 1 and 1000000"
        sourceImageRef:
          allOf:
          - $ref: './resource.yaml#/components/schemas/Reference'
          description: Reference to the source image used as the base for creating the block storage.
          example:
            resource: "images/image-123"

    BlockStorageStatus:
      description: |
        The status of the block storage.
      allOf:
      - $ref: './resource.yaml#/components/schemas/Status'
      - type: object
        readOnly: true
        description: |
          Conditions type `attachment` indicates the status of the volume attachment.
          The status can be `attached` or `detached`.
        required:
        - sizeGB
        properties:
          sizeGB:
            type: integer
            description: Size of the block storage in GB.
            maximum: 1000000
            example: 10
            x-oapi-codegen-extra-tags:
              x-cel-rule-0: "self > 0 && self <= 1000000"
              x-cel-message-0: "status.sizeGB must be between 1 and 1000000"
          attachedTo:
            allOf:
            - $ref: './resource.yaml#/components/schemas/ReferenceObject'
            description: Reference to the instance the block storage is attached to.
            example:
              provider: seca.compute/v1
              resource: instances/instance-123
              ref: seca.compute/v1/tenants/tn-1/workspaces/ws-1/instances/instance-123

    VolumeReference:
      type: object
      description: Represents a connection between a Block Storage and an a user of the block storage.
      required:
      - deviceRef
      properties:
        deviceRef:
          allOf:
          - $ref: './resource.yaml#/components/schemas/Reference'
          description: Reference to the block storage used to store the volume.
          example:
            resource: "block-storages/block-123"
        type:
          type: string
          x-go-type-skip-optional-pointer: true
          description: The connection type depends on the type of device and type of block storage.
          enum:
          - virtio
          default: virtio
          x-enumNames:
          - VolumeReferenceTypeVirtio
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: "self.size() == 0 || self in ['virtio']"
            x-cel-message-0: "spec.type must be 'virtio' or not set"
      example:
        deviceRef:
          resource: "block-storages/block-123"
        type: "virtio"
