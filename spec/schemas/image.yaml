Image:
  description: |
    Represents an Image resource that can be used to create a virtual machine.
  allOf:
  - $ref: './resource.yaml#/UserResourceMetadata'
  - type: object
    description: |
      Represents  an Image resource that can be used to create a virtual machine.
    required:
    - spec
    properties:
      metadata:
        $ref: './resource.yaml#/RegionalResourceMetadata'
      spec:
        $ref: './image.yaml#/ImageSpec'
      status:
        $ref: './image.yaml#/ImageStatus'
  example:
    labels:
      os: Linux
      vendor: Ubuntu
      version: "24.04"
    annotations:
      description: Ubuntu 24.04 LTS Image
    spec:
      cpuArchitecture: amd64
      boot: UEFI
      initializer: cloudinit-22

ImageSpec:
  description: |
    Specification of the Image resource. The Image can be used to create a virtual machine.
  type: object
  required:
  - cpuArchitecture
  properties:
    cpuArchitecture:
      type: string
      description: CPU architecture for the Image
      enum:
      - amd64
      - arm64
    initializer:  
      type: string
      description: Initializer for the Image
      enum:
      - none
      - cloudinit-22
      default: none
    boot:
      type: string
      description: Boot type for the Image
      enum:
      - UEFI
      - BIOS
      default: UEFI
    sizeMB:
      type: integer
      description: Size of the Image in MB
      example: 628

ImageStatus:
  $ref: "./resource.yaml#/Status"
