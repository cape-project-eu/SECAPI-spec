title: Foundation terraform resources and datasources
name: foundation
version: v1
description: |
  The Foundation terraform resources and datasources are ???
servers:
  - url: https://demo.secapi.cloud
    description: Base Path
resources:
  # Authorization
  - name: role
    plural: roles
    provider: authorization
    hierarchy: [tenant]
    schema: ./schemas/rbac.yaml#/components/schemas/Role
    operations: [list, get, put, delete]
  - name: role assignment
    plural: role assignments
    provider: authorization
    hierarchy: [tenant]
    schema: ./schemas/rbac.yaml#/components/schemas/RoleAssignment
    operations: [list, get, put, delete]

  # Region
  - name: region
    plural: regions
    provider: region
    hierarchy: []
    schema: './schemas/region.yaml#/components/schemas/Region'
    operations: [list, get]

  # Workspace
  - name: workspace
    plural: workspaces
    provider: workspace
    hierarchy: [tenant]
    schema: ./schemas/workspace.yaml#/components/schemas/Workspace
    operations: [list, get, put, delete]

  # Storage
  - name: storage sku
    plural: storage skus
    provider: storage
    hierarchy: [tenant]
    schema: ./schemas/storage-sku.yaml#/components/schemas/StorageSku
    operations: [list, get]
  - name: image
    plural: images
    provider: storage
    hierarchy: [tenant]
    schema: ./schemas/image.yaml#/components/schemas/Image
    operations: [list, get, put, delete]
  - name: block storage
    plural: block storages
    provider: storage
    hierarchy: [tenant, workspace]
    schema: ./schemas/block-storage.yaml#/components/schemas/BlockStorage
    operations: [list, get, put, delete]

  # Compute
  - name: instance sku
    plural: instance skus
    provider: compute
    hierarchy: [tenant]
    schema: ./schemas/instance-sku.yaml#/components/schemas/InstanceSku
    operations: [list, get]
  - name: instance
    plural: instances
    provider: compute
    hierarchy: [tenant, workspace]
    schema: ./schemas/instance.yaml#/components/schemas/Instance
    operations: [list, get, put, delete]
    actions:
    - name: start
    - name: stop
    - name: restart

  #Network
  - name: network sku
    plural: network skus
    hierarchy: [tenant]
    provider: network
    schema: ./schemas/network-sku.yaml#/components/schemas/NetworkSku
    operations: [list, get]
  - name: security group
    plural: security-groups
    hierarchy: [tenant, workspace]
    provider: network
    schema: './schemas/security-group.yaml#/components/schemas/SecurityGroup'
    operations: [list, get, put, delete]
  - name: security group rule
    plural: security-group-rules
    hierarchy: [tenant, workspace]
    provider: network
    schema: './schemas/security-group-rule.yaml#/components/schemas/SecurityGroupRule'
    operations: [list, get, put, delete]
  - name: nic
    plural: nics
    hierarchy: [tenant, workspace]
    provider: network
    schema: './schemas/nic.yaml#/components/schemas/Nic'
    operations: [list, get, put, delete]
  - name: public ip
    plural: public ips
    hierarchy: [tenant, workspace]
    provider: network
    schema: './schemas/public-ip.yaml#/components/schemas/PublicIp'
    operations: [list, get, put, delete]
  - name: network
    plural: networks
    hierarchy: [tenant, workspace]
    provider: network
    schema: './schemas/network.yaml#/components/schemas/Network'
    operations: [list, get, put, delete]
  - name: internet gateway
    plural: internet gateways
    hierarchy: [tenant, workspace]
    provider: network
    schema: './schemas/internet-gateway.yaml#/components/schemas/InternetGateway'
    operations: [list, get, put, delete]
  - name: subnet
    plural: subnets
    hierarchy: [tenant, workspace, network]
    provider: network
    schema: './schemas/subnet.yaml#/components/schemas/Subnet'
    operations: [list, get, put, delete]
  - name: route-table
    plural: route-tables
    hierarchy: [tenant, workspace, network]
    provider: network
    schema: './schemas/route-table.yaml#/components/schemas/RouteTable'
    operations: [list, get, put, delete]
